name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate
        run: |
          node --check server.js
          bash -n entrypoint-hls.sh
          awk '/cat > \/tmp\/hls_server.py << '\''PYEOF'\''/{flag=1;next}/^PYEOF$/{flag=0}flag' entrypoint-hls.sh > /tmp/hls_server_check.py
          python3 -m py_compile /tmp/hls_server_check.py

      - name: Install deploy tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends rsync openssh-client

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -eu
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_SSH_KEY"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          port="${DEPLOY_PORT:-22}"
          if [ -n "${DEPLOY_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "$port" "$DEPLOY_HOST" > ~/.ssh/known_hosts
          fi

          cat > ~/.ssh/config <<EOF
          Host katechon-deploy
            HostName $DEPLOY_HOST
            Port $port
            User $DEPLOY_USER
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy remote Node app
        env:
          DEPLOY_REMOTE_DIR: ${{ secrets.DEPLOY_REMOTE_DIR }}
        run: |
          remote_dir="${DEPLOY_REMOTE_DIR:-/opt/katechon/katechon-demo}"
          make deploy REMOTE=katechon-deploy REMOTE_DIR="$remote_dir"
