<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Rosadelmar Deck</title>
  <meta name="description" content="Rosadelmar alpha search engine deck for Katechon Technology.">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="deck" id="deck" aria-live="polite">
    <section class="slide active" data-slide="1">
      <div class="page-frame landscape">
        <img class="page-image" src="./assets/pages/pitch-1.jpg" alt="Rosadelmar pitch deck page 1">
      </div>
    </section>

    <section class="slide" data-slide="2">
      <div class="page-frame landscape">
        <img class="page-image" src="./assets/pages/pitch-2.jpg" alt="Rosadelmar pitch deck page 2">
      </div>
    </section>

    <section class="slide" data-slide="3">
      <div class="page-frame landscape">
        <img class="page-image" src="./assets/pages/pitch-3.jpg" alt="Rosadelmar pitch deck page 3">
      </div>
    </section>

    <section class="slide" data-slide="4">
      <div class="page-frame landscape">
        <img class="page-image" src="./assets/pages/pitch-4.jpg" alt="Rosadelmar pitch deck page 4">
      </div>
    </section>

    <section class="slide" data-slide="5">
      <div class="page-frame landscape">
        <img class="page-image" src="./assets/pages/pitch-5.jpg" alt="Rosadelmar pitch deck page 5">
      </div>
    </section>

    <section class="slide" data-slide="6">
      <div class="page-frame landscape">
        <img class="page-image" src="./assets/pages/pitch-6.jpg" alt="Rosadelmar pitch deck page 6">
      </div>
    </section>

    <section class="slide" data-slide="7">
      <div class="page-frame landscape">
        <img class="page-image" src="./assets/pages/pitch-7.jpg" alt="Rosadelmar pitch deck page 7">
      </div>
    </section>

    <section class="slide" data-slide="8">
      <div class="page-frame landscape">
        <img class="page-image" src="./assets/pages/pitch-8.jpg" alt="Rosadelmar pitch deck page 8">
      </div>
    </section>

    <section class="slide" data-slide="9">
      <div class="page-frame landscape">
        <img class="page-image" src="./assets/pages/pitch-9.jpg" alt="Rosadelmar pitch deck page 9">
      </div>
    </section>

    <section class="slide" data-slide="10">
      <div class="page-frame portrait">
        <img class="page-image" src="./assets/pages/one-pager-1.jpg" alt="Rosadelmar one-page memo">
      </div>
    </section>
  </main>

  <nav class="chrome" aria-label="Deck controls">
    <button class="icon-btn" id="prev" type="button" title="Previous slide" aria-label="Previous slide">&#8249;</button>
    <div class="meter" aria-hidden="true"><span id="progress"></span></div>
    <span class="counter" id="counter">01 / 10</span>
    <button class="icon-btn" id="next" type="button" title="Next slide" aria-label="Next slide">&#8250;</button>
    <button class="icon-btn sound" id="sound" type="button" title="Replay narration" aria-label="Replay narration">&#8635;</button>
  </nav>

  <audio id="narrator" preload="auto"></audio>
  <script src="./app.js"></script>
</body>
</html>
