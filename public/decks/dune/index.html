<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Katechon Technology</title>
  <meta name="description" content="Katechon Technology pitch cut for Dune Ventures.">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="deck" id="deck" aria-live="polite">
    <div class="motion-field" aria-hidden="true">
      <span class="vector vector-a"></span>
      <span class="vector vector-b"></span>
      <span class="vector vector-c"></span>
      <span class="pulse-node node-a"></span>
      <span class="pulse-node node-b"></span>
      <span class="pulse-node node-c"></span>
      <span class="pulse-node node-d"></span>
      <span class="narration-wave wave-a"></span>
      <span class="narration-wave wave-b"></span>
    </div>
  </main>

  <nav class="chrome" aria-label="Deck controls">
    <button class="icon-btn" id="prev" type="button" title="Previous slide" aria-label="Previous slide">‹</button>
    <div class="meter" aria-hidden="true"><span id="progress"></span></div>
    <button class="icon-btn" id="next" type="button" title="Next slide" aria-label="Next slide">›</button>
    <button class="icon-btn sound" id="sound" type="button" title="Replay narration" aria-label="Replay narration">◉</button>
  </nav>

  <audio id="narrator" preload="auto"></audio>
  <script src="https://cdn.jsdelivr.net/npm/animejs/dist/bundles/anime.umd.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
