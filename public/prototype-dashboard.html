<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Katechon Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/animejs/dist/bundles/anime.umd.min.js"></script>
  <style>
    :root {
      --bg0: #040609;
      --bg1: #0d1117;
      --panel: rgba(8, 12, 16, 0.76);
      --panel-strong: rgba(7, 10, 14, 0.92);
      --line: rgba(255,255,255,0.12);
      --line-hot: rgba(255,255,255,0.30);
      --text: #f3f6f8;
      --muted: rgba(243,246,248,0.66);
      --soft: rgba(243,246,248,0.42);
      --accent: #00e87b;
      --accent2: #7de8ff;
      --accent3: #ffbf5f;
      --danger: #ff625f;
    }

    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #000;
      overflow: hidden;
    }
    body {
      color: var(--text);
      font-family: Inter, "Helvetica Neue", Arial, sans-serif;
      background:
        radial-gradient(circle at 14% 9%, color-mix(in srgb, var(--accent2) 20%, transparent), transparent 28%),
        radial-gradient(circle at 84% 16%, color-mix(in srgb, var(--accent) 18%, transparent), transparent 26%),
        radial-gradient(circle at 50% 110%, color-mix(in srgb, var(--accent3) 12%, transparent), transparent 34%),
        linear-gradient(135deg, var(--bg0), var(--bg1) 58%, #030405);
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(ellipse at center, black, transparent 82%);
      pointer-events: none;
    }

    button {
      font: inherit;
      color: inherit;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255,255,255,0.055);
      cursor: pointer;
    }
    button:hover,
    button:focus-visible,
    button.active {
      outline: none;
      border-color: color-mix(in srgb, var(--accent) 66%, white);
      background: color-mix(in srgb, var(--accent) 15%, rgba(255,255,255,0.04));
    }

    .app {
      position: relative;
      z-index: 1;
      height: 100vh;
      min-height: 570px;
      padding: 15px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
    }

    .topbar,
    .module,
    .metric,
    .scene-card,
    .feed-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 18px 58px rgba(0,0,0,0.30);
      backdrop-filter: blur(12px);
    }

    .topbar {
      min-height: 94px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 14px;
      overflow: hidden;
    }
    .kicker,
    .tab,
    .section-label,
    .metric-label,
    .metric-note,
    .feed-time,
    .chip,
    .source-label,
    .mono {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .kicker {
      color: var(--accent2);
      font-size: 10px;
      margin-bottom: 7px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 16px color-mix(in srgb, var(--accent) 70%, transparent);
    }
    h1 {
      margin: 0;
      font-size: 38px;
      line-height: 0.98;
      letter-spacing: 0;
      max-width: 900px;
    }
    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.38;
      max-width: 840px;
    }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 7px;
      max-width: 420px;
    }
    .tab {
      min-height: 32px;
      padding: 0 10px;
      color: rgba(243,246,248,0.72);
      font-size: 9px;
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1.52fr) minmax(306px, 0.62fr);
      gap: 12px;
    }
    .main {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 9px;
    }
    .metric {
      min-height: 86px;
      padding: 12px;
      overflow: hidden;
      position: relative;
    }
    .metric::after {
      content: "";
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 10px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
      opacity: 0.58;
      transform-origin: left center;
    }
    .metric-label {
      color: var(--soft);
      font-size: 9px;
      margin-bottom: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .metric-value {
      font-size: 25px;
      line-height: 1;
      font-weight: 780;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .metric-note {
      margin-top: 7px;
      color: var(--muted);
      font-size: 9px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stage-wrap {
      min-height: 0;
      padding: 12px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
      overflow: hidden;
    }
    .section-head {
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .section-label {
      color: var(--accent);
      font-size: 10px;
    }
    .section-copy {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      max-width: 720px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .chip {
      flex-shrink: 0;
      min-height: 24px;
      display: inline-flex;
      align-items: center;
      padding: 0 8px;
      color: rgba(243,246,248,0.62);
      font-size: 9px;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 5px;
      background: rgba(0,0,0,0.22);
      max-width: 210px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .stage {
      position: relative;
      min-height: 0;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 8px;
      background:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
        rgba(0,0,0,0.25);
      background-size: 34px 34px;
      isolation: isolate;
    }
    .stage::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 7;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), transparent 12%, transparent 88%, rgba(0,0,0,0.24));
      mix-blend-mode: screen;
    }
    .texture-video {
      position: absolute;
      inset: 0;
      z-index: -2;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.18;
      filter: saturate(1.25) contrast(1.08);
    }
    .asset-plane {
      position: absolute;
      inset: 0;
      z-index: -3;
      background-image: var(--asset);
      background-size: cover;
      background-position: center;
      opacity: 0.22;
      filter: saturate(1.15) contrast(1.06);
    }
    .scene {
      position: absolute;
      inset: 14px;
      z-index: 1;
    }
    .scene-grid {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 50%, color-mix(in srgb, var(--accent2) 13%, transparent), transparent 34%),
        radial-gradient(circle at 20% 26%, color-mix(in srgb, var(--accent) 18%, transparent), transparent 20%),
        radial-gradient(circle at 80% 68%, color-mix(in srgb, var(--accent3) 14%, transparent), transparent 22%);
      opacity: 0.95;
    }
    .scan-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      top: 0;
      background: linear-gradient(90deg, transparent, var(--accent2), var(--accent), transparent);
      opacity: 0.72;
      box-shadow: 0 0 20px color-mix(in srgb, var(--accent2) 45%, transparent);
    }
    .node {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 18px color-mix(in srgb, var(--accent) 70%, transparent);
    }
    .line {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent2), transparent);
      transform-origin: left center;
      opacity: 0.72;
    }

    .rail {
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 12px;
    }
    .feed {
      min-height: 0;
      padding: 12px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
      overflow: hidden;
    }
    .feed-list {
      min-height: 0;
      overflow: auto;
      overflow-x: hidden;
      padding-right: 4px;
    }
    .feed-item {
      margin-bottom: 8px;
      padding: 11px;
      cursor: pointer;
      box-shadow: none;
      background: rgba(0,0,0,0.22);
      transition: border-color 120ms ease, background 120ms ease;
    }
    .feed-item.active,
    .feed-item:hover {
      border-color: color-mix(in srgb, var(--accent) 58%, white);
      background: color-mix(in srgb, var(--accent) 10%, rgba(0,0,0,0.30));
    }
    .feed-time {
      color: var(--soft);
      font-size: 9px;
      margin-bottom: 6px;
    }
    .feed-title {
      font-size: 13px;
      line-height: 1.28;
      color: rgba(243,246,248,0.88);
      overflow-wrap: anywhere;
    }
    .feed-meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .control-panel {
      padding: 12px;
      display: grid;
      gap: 10px;
    }
    .caption {
      min-height: 60px;
      color: rgba(243,246,248,0.82);
      font-size: 13px;
      line-height: 1.45;
    }
    .actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
    }
    .actions button {
      min-height: 34px;
      padding: 0 8px;
      color: rgba(243,246,248,0.74);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      text-transform: uppercase;
      letter-spacing: 0.10em;
      font-size: 9px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .scene-card {
      box-shadow: none;
      background: rgba(4, 7, 10, 0.66);
      overflow: hidden;
    }
    .source-label {
      color: var(--accent2);
      font-size: 9px;
    }
    .bar {
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), rgba(255,255,255,0.08));
    }

    .newsroom {
      display: grid;
      grid-template-columns: 0.88fr 1.12fr;
      gap: 12px;
    }
    .lead-visual {
      position: relative;
      padding: 13px;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 12px;
    }
    .lead-frame {
      min-height: 0;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 7px;
      background:
        radial-gradient(circle at 45% 32%, color-mix(in srgb, var(--accent3) 28%, transparent), transparent 26%),
        linear-gradient(135deg, color-mix(in srgb, var(--accent2) 20%, transparent), transparent 48%),
        rgba(0,0,0,0.32);
    }
    .source-stack {
      display: grid;
      grid-template-rows: repeat(5, 1fr);
      gap: 8px;
    }
    .source-row {
      padding: 10px;
      display: grid;
      grid-template-columns: 74px minmax(0, 1fr) 54px;
      gap: 10px;
      align-items: center;
    }
    .timeline-sweep {
      position: absolute;
      width: 1px;
      top: 8%;
      bottom: 8%;
      left: 50%;
      background: linear-gradient(transparent, var(--accent3), var(--accent2), transparent);
      box-shadow: 0 0 18px color-mix(in srgb, var(--accent3) 55%, transparent);
    }

    .market-mesh {
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 12px;
    }
    .chart-zone {
      position: relative;
      padding: 12px;
      display: grid;
      grid-template-rows: 1fr 72px;
      gap: 11px;
    }
    .candles,
    .depth-bars,
    .signal-bars {
      min-height: 0;
      display: grid;
      align-items: end;
      gap: 6px;
    }
    .candles { grid-template-columns: repeat(30, 1fr); }
    .candle {
      min-height: 22px;
      border-radius: 3px;
      background: color-mix(in srgb, var(--accent) 72%, transparent);
      position: relative;
    }
    .candle.down { background: color-mix(in srgb, var(--danger) 76%, transparent); }
    .candle::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -14px;
      width: 1px;
      height: calc(100% + 28px);
      background: currentColor;
      opacity: 0.38;
    }
    .ribbon-stack {
      display: grid;
      gap: 9px;
      padding: 12px;
    }
    .ribbon {
      min-height: 52px;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .command-map,
    .geo-signal,
    .abyss,
    .gridops,
    .viralnet,
    .darkwatch,
    .observatory,
    .quantum-field {
      position: relative;
    }
    .map-panel {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      background:
        radial-gradient(ellipse at 40% 46%, color-mix(in srgb, var(--accent) 18%, transparent), transparent 18%),
        radial-gradient(ellipse at 68% 54%, color-mix(in srgb, var(--accent3) 16%, transparent), transparent 20%),
        rgba(0,0,0,0.24);
    }
    .side-stack {
      position: absolute;
      right: 12px;
      top: 12px;
      bottom: 12px;
      width: 32%;
      display: grid;
      gap: 8px;
    }
    .side-stack .scene-card {
      padding: 10px;
      display: grid;
      align-content: center;
      gap: 7px;
    }

    .arena-scene {
      display: grid;
      grid-template-columns: 1fr 132px 1fr;
      gap: 12px;
    }
    .agent-lane {
      padding: 12px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 10px;
    }
    .code-stream {
      min-height: 0;
      display: grid;
      gap: 7px;
      overflow: hidden;
    }
    .code-line {
      min-height: 18px;
      border-radius: 4px;
      background: linear-gradient(90deg, color-mix(in srgb, var(--accent2) 42%, transparent), rgba(255,255,255,0.04));
    }
    .judge-core {
      display: grid;
      place-items: center;
      position: relative;
    }
    .judge-ring {
      width: 116px;
      height: 116px;
      border-radius: 50%;
      border: 1px solid color-mix(in srgb, var(--accent) 46%, white);
      box-shadow: 0 0 34px color-mix(in srgb, var(--accent) 24%, transparent), inset 0 0 34px rgba(255,255,255,0.06);
      display: grid;
      place-items: center;
      text-align: center;
    }

    .source-wall {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      grid-auto-rows: minmax(76px, 1fr);
      gap: 10px;
    }
    .wall-card {
      padding: 11px;
      display: grid;
      align-content: space-between;
      gap: 8px;
    }

    .orderbook {
      display: grid;
      grid-template-columns: 0.92fr 1.08fr 0.68fr;
      gap: 12px;
    }
    .book-side,
    .heat-column {
      padding: 12px;
      display: grid;
      gap: 6px;
    }
    .book-row {
      min-height: 20px;
      display: grid;
      grid-template-columns: 58px 1fr 46px;
      gap: 8px;
      align-items: center;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 11px;
      color: rgba(243,246,248,0.70);
    }
    .book-fill {
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }
    .book-side.asks .book-fill {
      background: linear-gradient(90deg, var(--danger), transparent);
    }
    .heat-cell {
      border-radius: 5px;
      background: linear-gradient(90deg, color-mix(in srgb, var(--accent3) 48%, transparent), rgba(255,255,255,0.04));
    }

    .prediction {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 12px;
    }
    .probability-stage {
      position: relative;
      padding: 14px;
    }
    .prob-curve {
      position: absolute;
      left: 8%;
      right: 8%;
      height: 42%;
      border: 1px solid color-mix(in srgb, var(--accent2) 34%, white);
      border-radius: 46% 54% 42% 58%;
      background: radial-gradient(ellipse at center, color-mix(in srgb, var(--accent2) 14%, transparent), transparent 62%);
    }
    .prob-curve:nth-child(2) {
      top: 15%;
      transform: rotate(-5deg);
    }
    .prob-curve:nth-child(3) {
      top: 34%;
      border-color: color-mix(in srgb, var(--accent) 40%, white);
      transform: rotate(7deg);
    }
    .prob-curve:nth-child(4) {
      top: 48%;
      border-color: color-mix(in srgb, var(--accent3) 36%, white);
      transform: rotate(-11deg);
    }
    .outcome-stack {
      display: grid;
      gap: 9px;
    }
    .outcome-card {
      padding: 12px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 58px;
      gap: 10px;
      align-items: center;
    }
    .prob-value {
      color: var(--accent);
      font-size: 24px;
      font-weight: 780;
      text-align: right;
    }

    .bio-lab {
      display: grid;
      grid-template-columns: 1fr 0.72fr;
      gap: 12px;
    }
    .molecule {
      position: relative;
      overflow: hidden;
    }
    .molecule-orbit {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 68%;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 1px solid color-mix(in srgb, var(--accent2) 24%, white);
      transform: translate(-50%, -50%);
    }
    .protein-node {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 20px color-mix(in srgb, var(--accent) 64%, transparent);
    }
    .pipeline {
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .observatory .star,
    .darkwatch .star {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(255,255,255,0.86);
      box-shadow: 0 0 9px rgba(255,255,255,0.7);
    }
    .pulsar-ring {
      position: absolute;
      left: 50%;
      top: 50%;
      border-radius: 50%;
      border: 1px solid color-mix(in srgb, var(--accent2) 28%, white);
      transform: translate(-50%, -50%);
    }
    .transit {
      position: absolute;
      left: 7%;
      right: 7%;
      bottom: 10%;
      height: 100px;
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 7px;
      overflow: hidden;
    }
    .transit-path {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 2px;
      background: linear-gradient(90deg, var(--accent2), var(--accent), var(--accent3));
    }

    .meme-scene {
      display: grid;
      grid-template-columns: 1fr 0.78fr;
      gap: 12px;
    }
    .bonding-curve {
      position: relative;
      overflow: hidden;
    }
    .curve-segment {
      position: absolute;
      left: 8%;
      right: 8%;
      height: 42%;
      bottom: 16%;
      border: 2px solid color-mix(in srgb, var(--accent3) 68%, white);
      border-left: 0;
      border-bottom: 0;
      border-radius: 0 80% 0 0;
    }
    .social-swarm .node {
      width: 8px;
      height: 8px;
    }

    .quantum-field .state-orb {
      position: absolute;
      width: 132px;
      height: 132px;
      border-radius: 50%;
      border: 1px solid color-mix(in srgb, var(--accent2) 34%, white);
      background: radial-gradient(circle at 44% 42%, color-mix(in srgb, var(--accent2) 18%, transparent), transparent 65%);
    }
    .qbit {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 18px color-mix(in srgb, var(--accent) 70%, transparent);
    }
    .quantum-stack {
      position: absolute;
      right: 12px;
      top: 12px;
      bottom: 12px;
      width: 30%;
      z-index: 5;
      display: grid;
      grid-template-rows: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }
    .quantum-stack .scene-card {
      min-height: 0;
      padding: 10px;
      display: grid;
      align-content: center;
      gap: 6px;
      background: rgba(5, 7, 12, 0.88);
    }
    .quantum-stack .scene-card > span,
    .quantum-stack .scene-card > strong {
      display: block;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .quantum-stack .scene-card > strong {
      font-size: 20px;
      line-height: 1;
    }
    .quantum-shelf {
      position: absolute;
      left: 7%;
      right: 36%;
      bottom: 8%;
      height: 142px;
      z-index: 4;
      border: 1px solid color-mix(in srgb, var(--accent3) 42%, white);
      border-radius: 8px;
      background:
        radial-gradient(ellipse at 36% 46%, color-mix(in srgb, var(--accent2) 18%, transparent), transparent 42%),
        linear-gradient(90deg, color-mix(in srgb, var(--accent) 18%, transparent), transparent 46%),
        linear-gradient(135deg, transparent 49%, color-mix(in srgb, var(--accent2) 24%, transparent) 50%, transparent 53%);
      overflow: hidden;
    }
    .quantum-shelf .bar {
      position: absolute;
      left: 16px;
      right: 16px;
      height: 3px;
      transform-origin: left center;
    }

    .abyss .wave {
      position: absolute;
      left: -10%;
      right: -10%;
      height: 70px;
      border-top: 1px solid color-mix(in srgb, var(--accent2) 24%, white);
      border-radius: 50%;
    }
    .vent {
      position: absolute;
      width: 34px;
      height: 92px;
      bottom: 6%;
      border-radius: 20px 20px 4px 4px;
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent3) 45%, transparent), rgba(0,0,0,0.28));
      box-shadow: 0 -22px 42px color-mix(in srgb, var(--accent3) 22%, transparent);
    }

    .gridops .grid-node {
      position: absolute;
      width: 18px;
      height: 18px;
      border: 1px solid color-mix(in srgb, var(--accent) 58%, white);
      border-radius: 4px;
      background: rgba(0,0,0,0.36);
      box-shadow: 0 0 20px color-mix(in srgb, var(--accent) 30%, transparent);
    }
    .power-line {
      position: absolute;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent3), transparent);
      transform-origin: left center;
    }

    .viralnet .person {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent2);
      box-shadow: 0 0 18px color-mix(in srgb, var(--accent2) 56%, transparent);
    }
    .scenario-curve {
      position: absolute;
      left: 7%;
      right: 7%;
      height: 34%;
      border-top: 2px solid var(--accent);
      border-radius: 50%;
    }

    .darkwatch .catalog-cell {
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.34);
    }
    .silence-window {
      position: absolute;
      left: 8%;
      right: 8%;
      bottom: 9%;
      height: 72px;
      border: 1px solid color-mix(in srgb, var(--accent3) 25%, white);
      border-radius: 7px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.035), transparent);
    }

    @media (max-width: 860px) {
      body { overflow: auto; }
      html, body { height: auto; min-height: 100%; }
      .app { height: auto; min-height: 100vh; }
      .topbar,
      .workspace,
      .newsroom,
      .market-mesh,
      .arena-scene,
      .orderbook,
      .prediction,
      .bio-lab,
      .meme-scene {
        grid-template-columns: 1fr;
      }
      .tabs { justify-content: flex-start; max-width: none; }
      h1 { font-size: 32px; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .stage { min-height: 520px; }
      .rail { grid-template-rows: auto auto; }
      .feed-list { max-height: 380px; }
      .side-stack { width: auto; left: 12px; top: auto; height: 150px; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <div class="kicker"><span class="live-dot"></span><span id="kicker"></span></div>
        <h1 id="title"></h1>
        <div class="subtitle" id="subtitle"></div>
      </div>
      <nav class="tabs" id="tabs" aria-label="Dashboard views"></nav>
    </header>

    <section class="workspace">
      <div class="main">
        <section class="metrics" id="metrics"></section>
        <section class="module stage-wrap">
          <div class="section-head">
            <div>
              <div class="section-label" id="visual-label"></div>
              <div class="section-copy" id="visual-copy"></div>
            </div>
            <span class="chip" id="source-chip">synthetic state</span>
          </div>
          <div class="stage" id="stage"></div>
        </section>
      </div>
      <aside class="rail">
        <section class="module feed">
          <div class="section-head">
            <div class="section-label" id="feed-label"></div>
            <span class="chip" id="clock"></span>
          </div>
          <div class="feed-list" id="feed"></div>
        </section>
        <section class="module control-panel">
          <div class="section-head">
            <div class="section-label">kat narration lens</div>
            <span class="chip" id="lens"></span>
          </div>
          <div class="caption" id="caption"></div>
          <div class="actions">
            <button type="button" id="pulse-btn">Pulse State</button>
            <button type="button" id="refresh-btn">Refresh Live</button>
            <button type="button" id="focus-btn">Focus Next</button>
          </div>
        </section>
      </aside>
    </section>
  </main>

  <script src="/dashboards/catalog.js"></script>
  <script src="/dashboards/prototype.js"></script>
</body>
</html>
