<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Katechon Dashboard</title>
  <style>
    :root {
      --bg: #050608;
      --panel: rgba(9, 12, 15, 0.82);
      --panel-strong: rgba(9, 12, 15, 0.94);
      --line: rgba(255,255,255,0.11);
      --line-hot: rgba(0,232,123,0.54);
      --text: #f2f4f7;
      --muted: rgba(242,244,247,0.62);
      --soft: rgba(242,244,247,0.38);
      --green: #00e87b;
      --cyan: #7de8ff;
      --amber: #ffbf5f;
      --red: #ff6b5f;
    }

    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      min-height: 100vh;
      margin: 0;
      background: var(--bg);
    }
    body {
      min-height: 100vh;
      color: var(--text);
      font-family: Inter, "Helvetica Neue", Arial, sans-serif;
      background:
        radial-gradient(circle at 18% 12%, rgba(125,232,255,0.13), transparent 25%),
        radial-gradient(circle at 80% 16%, rgba(0,232,123,0.10), transparent 24%),
        linear-gradient(135deg, #050608 0%, #101419 56%, #040506 100%);
      overflow: hidden;
    }

    button {
      font: inherit;
      color: inherit;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover,
    button.active {
      border-color: var(--line-hot);
      background: rgba(0,232,123,0.10);
    }

    .app {
      height: 100vh;
      min-height: 560px;
      padding: 18px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 14px;
    }

    .topbar,
    .module {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 16px 50px rgba(0,0,0,0.28);
      backdrop-filter: blur(10px);
    }

    .topbar {
      min-height: 86px;
      padding: 14px;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 18px;
      align-items: center;
    }

    .kicker,
    .metric-label,
    .section-label,
    .feed-time,
    .terminal,
    .chip,
    .button-row button {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      text-transform: uppercase;
      letter-spacing: 0.13em;
    }

    .kicker {
      color: var(--cyan);
      font-size: 10px;
      margin-bottom: 8px;
    }
    h1 {
      margin: 0;
      font-size: clamp(26px, 4.4vw, 54px);
      line-height: 0.95;
      letter-spacing: 0;
    }
    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      max-width: 760px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }
    .button-row button {
      min-height: 34px;
      padding: 0 11px;
      font-size: 10px;
    }

    .grid {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(280px, 0.65fr);
      gap: 14px;
    }

    .left {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 14px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      padding: 13px;
      min-height: 84px;
      position: relative;
      overflow: hidden;
    }
    .metric::after {
      content: "";
      position: absolute;
      left: 13px;
      right: 13px;
      bottom: 10px;
      height: 2px;
      background: linear-gradient(90deg, var(--green), rgba(125,232,255,0.22), transparent);
      opacity: 0.55;
    }
    .metric-label {
      color: var(--soft);
      font-size: 9px;
      margin-bottom: 10px;
    }
    .metric-value {
      font-size: 27px;
      font-weight: 750;
      line-height: 1;
    }
    .metric-note {
      color: var(--muted);
      font-size: 11px;
      margin-top: 6px;
    }

    .visual {
      min-height: 0;
      padding: 14px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
      overflow: hidden;
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .section-label {
      color: var(--green);
      font-size: 10px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      color: var(--muted);
      font-size: 9px;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 5px;
      background: rgba(0,0,0,0.22);
    }

    .stage {
      position: relative;
      min-height: 0;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 7px;
      background:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px),
        rgba(0,0,0,0.24);
      background-size: 32px 32px;
      overflow: hidden;
    }

    .map-grid {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 54%, rgba(125,232,255,0.10), transparent 38%),
        radial-gradient(ellipse at 36% 46%, rgba(0,232,123,0.12), transparent 16%),
        radial-gradient(ellipse at 67% 58%, rgba(255,191,95,0.10), transparent 18%);
    }
    .spectre-field {
      position: absolute;
      inset: 16px;
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 12px;
    }
    .spectre-map,
    .spectre-stack {
      min-height: 0;
      border: 1px solid rgba(0,232,123,0.18);
      border-radius: 7px;
      background: rgba(0,0,0,0.34);
      overflow: hidden;
      position: relative;
    }
    .spectre-map {
      background:
        radial-gradient(circle at 34% 42%, rgba(0,232,123,0.20), transparent 14%),
        radial-gradient(circle at 64% 56%, rgba(255,191,95,0.18), transparent 15%),
        radial-gradient(circle at 48% 24%, rgba(125,232,255,0.18), transparent 13%),
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px),
        rgba(2,7,7,0.84);
      background-size: auto, auto, auto, 38px 38px, 38px 38px, auto;
    }
    .spectre-track {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(125,232,255,0.68), transparent);
      transform-origin: left center;
      opacity: 0.82;
    }
    .spectre-node {
      position: absolute;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 18px rgba(0,232,123,0.68);
      animation: pulse 2.2s infinite;
    }
    .spectre-stack {
      display: grid;
      grid-template-rows: repeat(4, 1fr);
      gap: 8px;
      padding: 10px;
    }
    .spectre-card {
      min-height: 0;
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 6px;
      background: rgba(4,8,9,0.78);
      display: grid;
      align-content: center;
      gap: 5px;
    }
    .spectre-card strong {
      color: var(--green);
      font-size: 12px;
      letter-spacing: 0.04em;
    }
    .spectre-card span {
      height: 5px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(125,232,255,0.70), rgba(255,255,255,0.08));
    }
    .newsroom-field {
      position: absolute;
      inset: 16px;
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 12px;
    }
    .news-lead,
    .news-stack {
      min-height: 0;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 7px;
      background: rgba(4,6,8,0.72);
      overflow: hidden;
    }
    .news-lead {
      padding: 14px;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 12px;
      background:
        radial-gradient(circle at 42% 30%, rgba(255,191,95,0.20), transparent 28%),
        radial-gradient(circle at 68% 64%, rgba(125,232,255,0.13), transparent 30%),
        rgba(4,6,8,0.76);
    }
    .news-frame {
      min-height: 0;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      background:
        linear-gradient(135deg, rgba(125,232,255,0.20), transparent 44%),
        linear-gradient(45deg, transparent 48%, rgba(255,191,95,0.22), transparent 54%);
    }
    .news-stack {
      padding: 12px;
      display: grid;
      gap: 8px;
    }
    .news-row {
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      background: rgba(0,0,0,0.26);
    }
    .news-row strong {
      display: block;
      margin-bottom: 7px;
      color: rgba(242,244,247,0.84);
      font-size: 12px;
    }
    .pulse {
      position: absolute;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--amber);
      box-shadow: 0 0 0 0 rgba(255,191,95,0.50);
      animation: pulse 2.4s infinite;
    }
    @keyframes pulse {
      70% { box-shadow: 0 0 0 24px rgba(255,191,95,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,191,95,0); }
    }

    .card-wall {
      position: absolute;
      inset: 16px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-auto-rows: minmax(82px, 1fr);
      gap: 10px;
    }
    .mini-card {
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 6px;
      background: rgba(4, 6, 8, 0.70);
      overflow: hidden;
    }
    .mini-card strong {
      display: block;
      font-size: 12px;
      margin-bottom: 8px;
    }
    .mini-card span {
      display: block;
      height: 6px;
      margin: 7px 0;
      background: linear-gradient(90deg, rgba(125,232,255,0.60), rgba(255,255,255,0.08));
      border-radius: 999px;
    }
    .mini-card span:nth-child(3) { width: 74%; }
    .mini-card span:nth-child(4) { width: 48%; }

    .candle-field,
    .market-field,
    .probability-field {
      position: absolute;
      inset: 16px;
      display: grid;
      align-items: end;
      gap: 7px;
    }
    .candle-field { grid-template-columns: repeat(26, 1fr); }
    .candle {
      position: relative;
      min-height: 34px;
      border-radius: 3px;
      background: rgba(0,232,123,0.54);
    }
    .candle.down { background: rgba(255,107,95,0.62); }
    .candle::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -17px;
      width: 1px;
      height: calc(100% + 34px);
      background: currentColor;
      opacity: 0.42;
    }

    .probability-field {
      grid-template-columns: repeat(3, 1fr);
      align-items: stretch;
    }
    .curve {
      align-self: center;
      height: 58%;
      border: 1px solid rgba(125,232,255,0.22);
      border-radius: 48% 52% 44% 56%;
      background: radial-gradient(ellipse at center, rgba(125,232,255,0.16), transparent 60%);
      filter: blur(0.1px);
    }
    .curve:nth-child(2) {
      height: 82%;
      border-color: rgba(0,232,123,0.28);
      background: radial-gradient(ellipse at center, rgba(0,232,123,0.15), transparent 58%);
    }
    .curve:nth-child(3) {
      height: 66%;
      border-color: rgba(255,191,95,0.25);
      background: radial-gradient(ellipse at center, rgba(255,191,95,0.12), transparent 62%);
    }

    .market-field {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      align-items: stretch;
    }
    .market-tile {
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 6px;
      background: rgba(5, 8, 10, 0.72);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
    }
    .market-line {
      align-self: end;
      height: 42px;
      background:
        linear-gradient(135deg, transparent 45%, rgba(0,232,123,0.40) 46%, rgba(0,232,123,0.40) 52%, transparent 53%),
        linear-gradient(20deg, transparent 46%, rgba(125,232,255,0.32) 47%, rgba(125,232,255,0.32) 52%, transparent 53%);
    }

    .terminal {
      position: absolute;
      inset: 16px;
      padding: 14px;
      color: rgba(217,255,233,0.88);
      font-size: 12px;
      line-height: 1.6;
      border: 1px solid rgba(0,232,123,0.18);
      border-radius: 6px;
      background: rgba(0,0,0,0.48);
      overflow: hidden;
      text-transform: none;
      letter-spacing: 0;
    }
    .terminal div { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .terminal .warn { color: var(--amber); }
    .terminal .hot { color: var(--green); }

    .right {
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 14px;
    }

    .feed {
      min-height: 0;
      padding: 14px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
      overflow: hidden;
    }
    .feed-list {
      min-height: 0;
      overflow: auto;
      padding-right: 4px;
    }
    .feed-item {
      padding: 11px 0;
      border-top: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
    }
    .feed-item:first-child { border-top: 0; }
    .feed-item:hover .feed-title,
    .feed-item.active .feed-title { color: var(--green); }
    .feed-time {
      color: var(--soft);
      font-size: 9px;
      margin-bottom: 5px;
    }
    .feed-title {
      font-size: 13px;
      line-height: 1.25;
      transition: color 0.2s;
    }
    .feed-meta {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
      margin-top: 6px;
    }

    .narration {
      padding: 14px;
      display: grid;
      gap: 10px;
    }
    .caption {
      min-height: 60px;
      color: rgba(242,244,247,0.82);
      font-size: 13px;
      line-height: 1.45;
    }
    .caption.loading { color: var(--soft); }
    .actions {
      display: flex;
      gap: 8px;
    }
    .actions button {
      min-height: 34px;
      padding: 0 10px;
      font-size: 11px;
    }

    @media (max-width: 680px) {
      body { overflow: auto; }
      .app { height: auto; min-height: 100vh; }
      .topbar,
      .grid { grid-template-columns: 1fr; }
      .button-row { justify-content: flex-start; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .stage { min-height: 360px; }
      .right { grid-template-rows: auto auto; }
      .feed-list { max-height: 360px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <div class="kicker" id="kicker"></div>
        <h1 id="title"></h1>
        <div class="subtitle" id="subtitle"></div>
      </div>
      <div class="button-row" id="tabs"></div>
    </header>

    <section class="grid">
      <div class="left">
        <div class="metrics" id="metrics"></div>
        <section class="module visual">
          <div class="section-head">
            <div>
              <div class="section-label" id="visual-label"></div>
              <div class="subtitle" id="visual-copy"></div>
            </div>
            <span class="chip" id="mode-chip"></span>
          </div>
          <div class="stage" id="stage"></div>
        </section>
      </div>

      <aside class="right">
        <section class="module feed">
          <div class="section-head">
            <div class="section-label" id="feed-label"></div>
            <span class="chip" id="clock"></span>
          </div>
          <div class="feed-list" id="feed"></div>
        </section>
        <section class="module narration">
          <div class="section-head">
            <div class="section-label">kat narration</div>
            <span class="chip" id="narration-lens"></span>
          </div>
          <div class="caption" id="caption"></div>
          <div class="actions">
            <button type="button" id="narrate">Generate Line</button>
            <button type="button" id="pulse">Pulse Data</button>
            <button type="button" id="live">Live On</button>
          </div>
        </section>
      </aside>
    </section>
  </main>

    const config = DASHBOARDS[dashboardId] || DASHBOARDS["world-monitor"];
    let activeTab = config.tabs[0];
    let activeFeed = 0;
    let live = true;
    let tick = 0;
    let timer = null;

    const $ = (id) => document.getElementById(id);

    function render() {
      document.title = `${config.title} - Katechon`;
      $("kicker").textContent = config.kicker;
      $("title").textContent = config.title;
      $("subtitle").textContent = config.subtitle;
      $("visual-label").textContent = config.visualLabel;
      $("visual-copy").textContent = config.visualCopy;
      $("feed-label").textContent = config.feedLabel;
      $("narration-lens").textContent = config.lens;
      $("caption").textContent = config.caption;
      renderTabs();
      renderMetrics();
      renderVisual();
      renderFeed();
      updateClock();
      startLiveLoop();
    }

    function renderTabs() {
      $("tabs").innerHTML = "";
      config.tabs.forEach((tab) => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = tab;
        button.className = tab === activeTab ? "active" : "";
        button.addEventListener("click", () => {
          activeTab = tab;
          activeFeed = 0;
          renderMetrics();
          renderVisual();
          renderFeed();
        });
        $("tabs").appendChild(button);
      });
    }

    function metricValue(raw, index) {
      if (!live) return raw;
      if (/^\d+$/.test(raw)) return String(Number(raw) + ((tick + index) % 3));
      if (/^\d+\.\d$/.test(raw)) return (Number(raw) + (((tick + index) % 5) - 2) / 10).toFixed(1);
      if (/^\d+%$/.test(raw)) return `${Math.max(1, Math.min(99, Number(raw.slice(0, -1)) + ((tick + index) % 3) - 1))}%`;
      return raw;
    }

    function renderMetrics() {
      $("metrics").innerHTML = "";
      config.metrics.forEach((metric, index) => {
        const el = document.createElement("div");
        el.className = "module metric";
        el.innerHTML = `
          <div class="metric-label">${metric[0]}</div>
          <div class="metric-value">${metricValue(metric[1], index)}</div>
          <div class="metric-note">${activeTab} / ${metric[2]}</div>
        `;
        $("metrics").appendChild(el);
      });
    }

    function renderVisual() {
      $("mode-chip").textContent = activeTab;
      const stage = $("stage");
      stage.innerHTML = "";
      if (config.visual === "map") renderMap(stage);
      if (config.visual === "spectre") renderSpectre(stage);
      if (config.visual === "newsroom") renderNewsroom(stage);
      if (config.visual === "cards") renderCards(stage);
      if (config.visual === "candles") renderCandles(stage);
      if (config.visual === "probability") renderProbability(stage);
      if (config.visual === "terminal") renderTerminal(stage);
      if (config.visual === "markets") renderMarkets(stage);
    }

    function renderMap(stage) {
      const map = document.createElement("div");
      map.className = "map-grid";
      stage.appendChild(map);
      const positions = [[20, 38], [38, 46], [51, 31], [61, 58], [75, 44], [47, 72]];
      positions.forEach(([left, top], index) => {
        const dot = document.createElement("span");
        dot.className = "pulse";
        dot.style.left = `${left + ((tick + index) % 3)}%`;
        dot.style.top = `${top}%`;
        dot.style.animationDelay = `${index * 0.34}s`;
        stage.appendChild(dot);
      });
    }

    function renderSpectre(stage) {
      const field = document.createElement("div");
      field.className = "spectre-field";
      field.innerHTML = `
        <div class="spectre-map">
          <span class="spectre-track" style="left: 18%; top: 42%; width: 48%; transform: rotate(13deg);"></span>
          <span class="spectre-track" style="left: 36%; top: 62%; width: 38%; transform: rotate(-18deg);"></span>
          <span class="spectre-track" style="left: 42%; top: 28%; width: 31%; transform: rotate(39deg);"></span>
        </div>
        <div class="spectre-stack">
          <div class="spectre-card"><strong>source confidence</strong><span></span><span></span></div>
          <div class="spectre-card"><strong>signal cluster</strong><span></span><span></span></div>
          <div class="spectre-card"><strong>analyst posture</strong><span></span><span></span></div>
          <div class="spectre-card"><strong>watch queue</strong><span></span><span></span></div>
        </div>
      `;
      stage.appendChild(field);
      [[26, 44], [48, 31], [62, 58], [73, 41], [39, 68]].forEach(([left, top], index) => {
        const node = document.createElement("span");
        node.className = "spectre-node";
        node.style.left = `${left + ((tick + index) % 2)}%`;
        node.style.top = `${top}%`;
        node.style.animationDelay = `${index * 0.25}s`;
        field.querySelector(".spectre-map").appendChild(node);
      });
    }

    function renderNewsroom(stage) {
      const field = document.createElement("div");
      field.className = "newsroom-field";
      const rows = config.feed.slice(0, 4).map((item) => `
        <div class="news-row">
          <strong>${item[0]} / ${item[2]}</strong>
          <span>${item[1]}</span>
        </div>
      `).join("");
      field.innerHTML = `
        <div class="news-lead">
          <div class="news-frame"></div>
          <div>
            <span class="chip">${activeTab}</span>
            <div class="subtitle">visual brief assembled from source cards</div>
          </div>
        </div>
        <div class="news-stack">${rows}</div>
      `;
      stage.appendChild(field);
    }

    function renderCards(stage) {
      const wall = document.createElement("div");
      wall.className = "card-wall";
      config.feed.concat(config.feed.slice(0, 1)).slice(0, 6).forEach((item, index) => {
        const card = document.createElement("div");
        card.className = "mini-card";
        card.innerHTML = `<strong>${item[0]} / ${config.tabs[index % config.tabs.length]}</strong><span></span><span></span><span></span>`;
        wall.appendChild(card);
      });
      stage.appendChild(wall);
    }

    function renderCandles(stage) {
      const field = document.createElement("div");
      field.className = "candle-field";
      for (let i = 0; i < 26; i++) {
        const candle = document.createElement("span");
        candle.className = `candle ${((i + tick) % 5 === 0 || i % 7 === 0) ? "down" : ""}`;
        candle.style.height = `${28 + ((i * 17 + tick * 9) % 70)}%`;
        candle.style.color = candle.className.includes("down") ? "var(--red)" : "var(--green)";
        field.appendChild(candle);
      }
      stage.appendChild(field);
    }

    function renderProbability(stage) {
      const field = document.createElement("div");
      field.className = "probability-field";
      for (let i = 0; i < 3; i++) {
        const curve = document.createElement("div");
        curve.className = "curve";
        curve.style.transform = `translateY(${((tick + i) % 5) - 2}px) rotate(${(tick + i * 6) % 18 - 9}deg)`;
        field.appendChild(curve);
      }
      stage.appendChild(field);
    }

    function renderTerminal(stage) {
      const terminal = document.createElement("div");
      terminal.className = "terminal";
      const lines = config.terminal || [
        ["hot", `$ polyrec --market btc-updown --mode ${activeTab.toLowerCase().replace(/\s+/g, "-")}`],
        ["", `ref_price=synthetic tick=${String(tick).padStart(4, "0")} book_depth=72k spread=3.1`],
        ["warn", "oracle_window=watch settlement_clock=active slippage_model=on"],
        ["", "yes_bid=48.5 yes_ask=51.6 no_bid=47.9 no_ask=52.1"],
        ["", "curve.fit confidence=medium edge_after_fees=thin"],
        ["", "backtest replay: 30d / volume filtered / latency adjusted"],
        ["hot", "operator note: keep spread, clock, and reference visible"],
      ];
      terminal.innerHTML = lines.map(([className, text]) =>
        `<div${className ? ` class="${className}"` : ""}>${text}</div>`
      ).join("");
      stage.appendChild(terminal);
    }

    function renderMarkets(stage) {
      const field = document.createElement("div");
      field.className = "market-field";
      ["Breadth", "Macro", "News", "Factor", "Risk", "Rates", "Oil", "Vol"].forEach((label, index) => {
        const tile = document.createElement("div");
        tile.className = "market-tile";
        tile.innerHTML = `<span class="chip">${label}</span><div class="market-line"></div><strong>${54 + ((tick + index * 7) % 39)}</strong>`;
        field.appendChild(tile);
      });
      stage.appendChild(field);
    }

    function renderFeed() {
      $("feed").innerHTML = "";
      config.feed.forEach((item, index) => {
        const el = document.createElement("div");
        el.className = `feed-item ${index === activeFeed ? "active" : ""}`;
        el.innerHTML = `
          <div class="feed-time">${item[0]} / ${activeTab}</div>
          <div class="feed-title">${item[1]}</div>
          <div class="feed-meta">${item[2]}</div>
        `;
        el.addEventListener("click", () => {
          activeFeed = index;
          $("caption").textContent = `${config.title}: ${item[1]} Kat would narrate this through the ${config.lens} lens.`;
          renderFeed();
        });
        $("feed").appendChild(el);
      });
    }

    function pulseData() {
      tick += 1;
      activeFeed = (activeFeed + 1) % config.feed.length;
      renderMetrics();
      renderVisual();
      renderFeed();
      $("caption").textContent = `${config.title} shifted to ${activeTab.toLowerCase()} mode. Kat's narration lens is ${config.lens}.`;
    }

    function updateClock() {
      const now = new Date();
      $("clock").textContent = now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    }

    function startLiveLoop() {
      if (timer) clearInterval(timer);
      timer = setInterval(() => {
        updateClock();
        if (!live) return;
        tick += 1;
        renderMetrics();
        renderVisual();
      }, 2600);
    }

    async function generateNarration() {
      const button = $("narrate");
      button.disabled = true;
      $("caption").classList.add("loading");
      $("caption").textContent = "Generating dashboard-specific Kat line...";
      try {
        const resp = await fetch(`/api/narration/${dashboardId}?mute=1`, { cache: "no-store" });
        const payload = await resp.json();
        if (!resp.ok) throw new Error(payload.error || `narration ${resp.status}`);
        $("caption").textContent = payload.text || config.caption;
      } catch (err) {
        $("caption").textContent = config.caption;
        console.warn("narration preview failed:", err);
      } finally {
        $("caption").classList.remove("loading");
        button.disabled = false;
      }
    }

    $("narrate").addEventListener("click", generateNarration);
    $("pulse").addEventListener("click", pulseData);
    $("live").addEventListener("click", () => {
      live = !live;
      $("live").textContent = live ? "Live On" : "Live Off";
      $("live").classList.toggle("active", live);
    });
    $("live").classList.add("active");

    render();
  </script>
