<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Katechon Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/animejs/dist/bundles/anime.umd.min.js"></script>
  <style>
    :root {
      --bg0: #040609;
      --bg1: #0d1117;
      --panel: rgba(8, 12, 16, 0.76);
      --panel-strong: rgba(7, 10, 14, 0.92);
      --line: rgba(255,255,255,0.12);
      --line-hot: rgba(255,255,255,0.30);
      --text: #f3f6f8;
      --muted: rgba(243,246,248,0.66);
      --soft: rgba(243,246,248,0.42);
      --accent: #00e87b;
      --accent2: #7de8ff;
      --accent3: #ffbf5f;
      --danger: #ff625f;
    }

    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #000;
      overflow: hidden;
    }
    body {
      color: var(--text);
      font-family: Inter, "Helvetica Neue", Arial, sans-serif;
      background:
        radial-gradient(circle at 14% 9%, color-mix(in srgb, var(--accent2) 20%, transparent), transparent 28%),
        radial-gradient(circle at 84% 16%, color-mix(in srgb, var(--accent) 18%, transparent), transparent 26%),
        radial-gradient(circle at 50% 110%, color-mix(in srgb, var(--accent3) 12%, transparent), transparent 34%),
        linear-gradient(135deg, var(--bg0), var(--bg1) 58%, #030405);
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(ellipse at center, black, transparent 82%);
      pointer-events: none;
    }

    button {
      font: inherit;
      color: inherit;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255,255,255,0.055);
      cursor: pointer;
    }
    button:hover,
    button:focus-visible,
    button.active {
      outline: none;
      border-color: color-mix(in srgb, var(--accent) 66%, white);
      background: color-mix(in srgb, var(--accent) 15%, rgba(255,255,255,0.04));
    }

    .app {
      position: relative;
      z-index: 1;
      height: 100vh;
      min-height: 570px;
      padding: 15px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
    }

    .topbar,
    .module,
    .metric,
    .scene-card,
    .feed-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 18px 58px rgba(0,0,0,0.30);
      backdrop-filter: blur(12px);
    }

    .topbar {
      min-height: 94px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 14px;
      overflow: hidden;
    }
    .kicker,
    .tab,
    .section-label,
    .metric-label,
    .metric-note,
    .feed-time,
    .chip,
    .source-label,
    .mono {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .kicker {
      color: var(--accent2);
      font-size: 10px;
      margin-bottom: 7px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 16px color-mix(in srgb, var(--accent) 70%, transparent);
    }
    h1 {
      margin: 0;
      font-size: 38px;
      line-height: 0.98;
      letter-spacing: 0;
      max-width: 900px;
    }
    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.38;
      max-width: 840px;
    }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 7px;
      max-width: 420px;
    }
    .tab {
      min-height: 32px;
      padding: 0 10px;
      color: rgba(243,246,248,0.72);
      font-size: 9px;
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1.52fr) minmax(306px, 0.62fr);
      gap: 12px;
    }
    .main {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 9px;
    }
    .metric {
      min-height: 86px;
      padding: 12px;
      overflow: hidden;
      position: relative;
    }
    .metric::after {
      content: "";
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 10px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
      opacity: 0.58;
      transform-origin: left center;
    }
    .metric-label {
      color: var(--soft);
      font-size: 9px;
      margin-bottom: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .metric-value {
      font-size: 25px;
      line-height: 1;
      font-weight: 780;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .metric-note {
      margin-top: 7px;
      color: var(--muted);
      font-size: 9px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stage-wrap {
      min-height: 0;
      padding: 12px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
      overflow: hidden;
    }
    .section-head {
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .section-label {
      color: var(--accent);
      font-size: 10px;
    }
    .section-copy {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      max-width: 720px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .chip {
      flex-shrink: 0;
      min-height: 24px;
      display: inline-flex;
      align-items: center;
      padding: 0 8px;
      color: rgba(243,246,248,0.62);
      font-size: 9px;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 5px;
      background: rgba(0,0,0,0.22);
      max-width: 210px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .stage {
      position: relative;
      min-height: 0;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 8px;
      background:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
        rgba(0,0,0,0.25);
      background-size: 34px 34px;
      isolation: isolate;
    }
    .stage::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 7;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), transparent 12%, transparent 88%, rgba(0,0,0,0.24));
      mix-blend-mode: screen;
    }
    .texture-video {
      position: absolute;
      inset: 0;
      z-index: -2;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.18;
      filter: saturate(1.25) contrast(1.08);
    }
    .asset-plane {
      position: absolute;
      inset: 0;
      z-index: -3;
      background-image: var(--asset);
      background-size: cover;
      background-position: center;
      opacity: 0.22;
      filter: saturate(1.15) contrast(1.06);
    }
    .scene {
      position: absolute;
      inset: 14px;
      z-index: 1;
    }
    .scene-grid {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 50%, color-mix(in srgb, var(--accent2) 13%, transparent), transparent 34%),
        radial-gradient(circle at 20% 26%, color-mix(in srgb, var(--accent) 18%, transparent), transparent 20%),
        radial-gradient(circle at 80% 68%, color-mix(in srgb, var(--accent3) 14%, transparent), transparent 22%);
      opacity: 0.95;
    }
    .scan-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      top: 0;
      background: linear-gradient(90deg, transparent, var(--accent2), var(--accent), transparent);
      opacity: 0.72;
      box-shadow: 0 0 20px color-mix(in srgb, var(--accent2) 45%, transparent);
    }
    .node {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 18px color-mix(in srgb, var(--accent) 70%, transparent);
    }
    .line {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent2), transparent);
      transform-origin: left center;
      opacity: 0.72;
    }

    .rail {
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 12px;
    }
    .feed {
      min-height: 0;
      padding: 12px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
      overflow: hidden;
    }
    .feed-list {
      min-height: 0;
      overflow: auto;
      overflow-x: hidden;
      padding-right: 4px;
    }
    .feed-item {
      margin-bottom: 8px;
      padding: 11px;
      cursor: pointer;
      box-shadow: none;
      background: rgba(0,0,0,0.22);
      transition: border-color 120ms ease, background 120ms ease;
    }
    .feed-item.active,
    .feed-item:hover {
      border-color: color-mix(in srgb, var(--accent) 58%, white);
      background: color-mix(in srgb, var(--accent) 10%, rgba(0,0,0,0.30));
    }
    .feed-time {
      color: var(--soft);
      font-size: 9px;
      margin-bottom: 6px;
    }
    .feed-title {
      font-size: 13px;
      line-height: 1.28;
      color: rgba(243,246,248,0.88);
      overflow-wrap: anywhere;
    }
    .feed-meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .control-panel {
      padding: 12px;
      display: grid;
      gap: 10px;
    }
    .caption {
      min-height: 60px;
      color: rgba(243,246,248,0.82);
      font-size: 13px;
      line-height: 1.45;
    }
    .actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
    }
    .actions button {
      min-height: 34px;
      padding: 0 8px;
      color: rgba(243,246,248,0.74);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      text-transform: uppercase;
      letter-spacing: 0.10em;
      font-size: 9px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .scene-card {
      box-shadow: none;
      background: rgba(4, 7, 10, 0.66);
      overflow: hidden;
    }
    .source-label {
      color: var(--accent2);
      font-size: 9px;
    }
    .bar {
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), rgba(255,255,255,0.08));
    }

    .newsroom {
      display: grid;
      grid-template-columns: 0.88fr 1.12fr;
      gap: 12px;
    }
    .lead-visual {
      position: relative;
      padding: 13px;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 12px;
    }
    .lead-frame {
      min-height: 0;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 7px;
      background:
        radial-gradient(circle at 45% 32%, color-mix(in srgb, var(--accent3) 28%, transparent), transparent 26%),
        linear-gradient(135deg, color-mix(in srgb, var(--accent2) 20%, transparent), transparent 48%),
        rgba(0,0,0,0.32);
    }
    .source-stack {
      display: grid;
      grid-template-rows: repeat(5, 1fr);
      gap: 8px;
    }
    .source-row {
      padding: 10px;
      display: grid;
      grid-template-columns: 74px minmax(0, 1fr) 54px;
      gap: 10px;
      align-items: center;
    }
    .timeline-sweep {
      position: absolute;
      width: 1px;
      top: 8%;
      bottom: 8%;
      left: 50%;
      background: linear-gradient(transparent, var(--accent3), var(--accent2), transparent);
      box-shadow: 0 0 18px color-mix(in srgb, var(--accent3) 55%, transparent);
    }

    .market-mesh {
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 12px;
    }
    .chart-zone {
      position: relative;
      padding: 12px;
      display: grid;
      grid-template-rows: 1fr 72px;
      gap: 11px;
    }
    .candles,
    .depth-bars,
    .signal-bars {
      min-height: 0;
      display: grid;
      align-items: end;
      gap: 6px;
    }
    .candles { grid-template-columns: repeat(30, 1fr); }
    .candle {
      min-height: 22px;
      border-radius: 3px;
      background: color-mix(in srgb, var(--accent) 72%, transparent);
      position: relative;
    }
    .candle.down { background: color-mix(in srgb, var(--danger) 76%, transparent); }
    .candle::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -14px;
      width: 1px;
      height: calc(100% + 28px);
      background: currentColor;
      opacity: 0.38;
    }
    .ribbon-stack {
      display: grid;
      gap: 9px;
      padding: 12px;
    }
    .ribbon {
      min-height: 52px;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .command-map,
    .geo-signal,
    .abyss,
    .gridops,
    .viralnet,
    .darkwatch,
    .observatory,
    .quantum-field {
      position: relative;
    }
    .map-panel {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      background:
        radial-gradient(ellipse at 40% 46%, color-mix(in srgb, var(--accent) 18%, transparent), transparent 18%),
        radial-gradient(ellipse at 68% 54%, color-mix(in srgb, var(--accent3) 16%, transparent), transparent 20%),
        rgba(0,0,0,0.24);
    }
    .side-stack {
      position: absolute;
      right: 12px;
      top: 12px;
      bottom: 12px;
      width: 32%;
      display: grid;
      gap: 8px;
    }
    .side-stack .scene-card {
      padding: 10px;
      display: grid;
      align-content: center;
      gap: 7px;
    }

    .arena-scene {
      display: grid;
      grid-template-columns: 1fr 132px 1fr;
      gap: 12px;
    }
    .agent-lane {
      padding: 12px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 10px;
    }
    .code-stream {
      min-height: 0;
      display: grid;
      gap: 7px;
      overflow: hidden;
    }
    .code-line {
      min-height: 18px;
      border-radius: 4px;
      background: linear-gradient(90deg, color-mix(in srgb, var(--accent2) 42%, transparent), rgba(255,255,255,0.04));
    }
    .judge-core {
      display: grid;
      place-items: center;
      position: relative;
    }
    .judge-ring {
      width: 116px;
      height: 116px;
      border-radius: 50%;
      border: 1px solid color-mix(in srgb, var(--accent) 46%, white);
      box-shadow: 0 0 34px color-mix(in srgb, var(--accent) 24%, transparent), inset 0 0 34px rgba(255,255,255,0.06);
      display: grid;
      place-items: center;
      text-align: center;
    }

    .source-wall {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      grid-auto-rows: minmax(76px, 1fr);
      gap: 10px;
    }
    .wall-card {
      padding: 11px;
      display: grid;
      align-content: space-between;
      gap: 8px;
    }

    .orderbook {
      display: grid;
      grid-template-columns: 0.92fr 1.08fr 0.68fr;
      gap: 12px;
    }
    .book-side,
    .heat-column {
      padding: 12px;
      display: grid;
      gap: 6px;
    }
    .book-row {
      min-height: 20px;
      display: grid;
      grid-template-columns: 58px 1fr 46px;
      gap: 8px;
      align-items: center;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 11px;
      color: rgba(243,246,248,0.70);
    }
    .book-fill {
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }
    .book-side.asks .book-fill {
      background: linear-gradient(90deg, var(--danger), transparent);
    }
    .heat-cell {
      border-radius: 5px;
      background: linear-gradient(90deg, color-mix(in srgb, var(--accent3) 48%, transparent), rgba(255,255,255,0.04));
    }

    .prediction {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 12px;
    }
    .probability-stage {
      position: relative;
      padding: 14px;
    }
    .prob-curve {
      position: absolute;
      left: 8%;
      right: 8%;
      height: 42%;
      border: 1px solid color-mix(in srgb, var(--accent2) 34%, white);
      border-radius: 46% 54% 42% 58%;
      background: radial-gradient(ellipse at center, color-mix(in srgb, var(--accent2) 14%, transparent), transparent 62%);
    }
    .prob-curve:nth-child(2) {
      top: 15%;
      transform: rotate(-5deg);
    }
    .prob-curve:nth-child(3) {
      top: 34%;
      border-color: color-mix(in srgb, var(--accent) 40%, white);
      transform: rotate(7deg);
    }
    .prob-curve:nth-child(4) {
      top: 48%;
      border-color: color-mix(in srgb, var(--accent3) 36%, white);
      transform: rotate(-11deg);
    }
    .outcome-stack {
      display: grid;
      gap: 9px;
    }
    .outcome-card {
      padding: 12px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 58px;
      gap: 10px;
      align-items: center;
    }
    .prob-value {
      color: var(--accent);
      font-size: 24px;
      font-weight: 780;
      text-align: right;
    }

    .bio-lab {
      display: grid;
      grid-template-columns: 1fr 0.72fr;
      gap: 12px;
    }
    .molecule {
      position: relative;
      overflow: hidden;
    }
    .molecule-orbit {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 68%;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 1px solid color-mix(in srgb, var(--accent2) 24%, white);
      transform: translate(-50%, -50%);
    }
    .protein-node {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 20px color-mix(in srgb, var(--accent) 64%, transparent);
    }
    .pipeline {
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .observatory .star,
    .darkwatch .star {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(255,255,255,0.86);
      box-shadow: 0 0 9px rgba(255,255,255,0.7);
    }
    .pulsar-ring {
      position: absolute;
      left: 50%;
      top: 50%;
      border-radius: 50%;
      border: 1px solid color-mix(in srgb, var(--accent2) 28%, white);
      transform: translate(-50%, -50%);
    }
    .transit {
      position: absolute;
      left: 7%;
      right: 7%;
      bottom: 10%;
      height: 100px;
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 7px;
      overflow: hidden;
    }
    .transit-path {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 2px;
      background: linear-gradient(90deg, var(--accent2), var(--accent), var(--accent3));
    }

    .meme-scene {
      display: grid;
      grid-template-columns: 1fr 0.78fr;
      gap: 12px;
    }
    .bonding-curve {
      position: relative;
      overflow: hidden;
    }
    .curve-segment {
      position: absolute;
      left: 8%;
      right: 8%;
      height: 42%;
      bottom: 16%;
      border: 2px solid color-mix(in srgb, var(--accent3) 68%, white);
      border-left: 0;
      border-bottom: 0;
      border-radius: 0 80% 0 0;
    }
    .social-swarm .node {
      width: 8px;
      height: 8px;
    }

    .quantum-field .state-orb {
      position: absolute;
      width: 132px;
      height: 132px;
      border-radius: 50%;
      border: 1px solid color-mix(in srgb, var(--accent2) 34%, white);
      background: radial-gradient(circle at 44% 42%, color-mix(in srgb, var(--accent2) 18%, transparent), transparent 65%);
    }
    .qbit {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 18px color-mix(in srgb, var(--accent) 70%, transparent);
    }
    .quantum-stack {
      position: absolute;
      right: 12px;
      top: 12px;
      bottom: 12px;
      width: 30%;
      z-index: 5;
      display: grid;
      grid-template-rows: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }
    .quantum-stack .scene-card {
      min-height: 0;
      padding: 10px;
      display: grid;
      align-content: center;
      gap: 6px;
      background: rgba(5, 7, 12, 0.88);
    }
    .quantum-stack .scene-card > span,
    .quantum-stack .scene-card > strong {
      display: block;

        ],
        caption: "Kat narrates Viral Spread through thresholds: transmission, contact density, detection lag, and scenario shape.",
      },
      "dark-forest": {

        asset: "generated/dashboards/dark-forest-catalog.jpg",

        visualCopy: "A quiet star catalog keeps absence, dimming, and statistical deviation readable without speculation.",

        tabs: ["Catalog", "Dimming", "Silence", "Clusters"],
        metrics: [["Stars", "118K", "catalog"], ["Dimming", "3", "sequence"], ["Sigma", "2.7", "deviation"], ["Window", "Long", "baseline"]],

        caption: "Kat keeps Dark Forest measured: what should be here, what is absent, and what deviates.",
      },
    };

    const config = dashboards[dashboardId] || dashboards["world-monitor"];
    const palette = palettes[config.palette] || palettes.acid;
    const state = {
      activeTab: config.tabs[0],
      activeFeed: 0,
      tick: 0,
      metrics: config.metrics.map((item) => [...item]),
      feed: config.feed.map((item) => [...item]),
      livePayload: null,
    };

    const animeApi = window.anime || {};
    const reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const canMotion = !reduceMotion && typeof animeApi.animate === "function";
    const stagger = (value, options) => typeof animeApi.stagger === "function" ? animeApi.stagger(value, options) : 0;
    const $ = (id) => document.getElementById(id);

    function animate(target, params) {
      if (!canMotion) return null;
      return animeApi.animate(target, params);
    }

    function setTheme() {
      document.documentElement.style.setProperty("--accent", palette[0]);
      document.documentElement.style.setProperty("--accent2", palette[1]);
      document.documentElement.style.setProperty("--accent3", palette[2]);
      document.documentElement.style.setProperty("--bg0", palette[3]);
      document.documentElement.style.setProperty("--bg1", palette[4]);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      })[char]);
    }

    function seededValue(index, min, max) {
      const seed = Math.sin((index + 1) * 9301 + dashboardId.length * 49297 + state.tick * 233) * 10000;
      const n = seed - Math.floor(seed);
      return min + n * (max - min);
    }

    function render() {
      setTheme();
      document.title = `${config.title} - Katechon`;
      $("kicker").textContent = config.kicker;
      $("title").textContent = config.title;
      $("subtitle").textContent = config.subtitle;
      $("visual-label").textContent = config.visualLabel;
      $("visual-copy").textContent = config.visualCopy;
      $("feed-label").textContent = config.feedLabel;
      $("lens").textContent = config.lens;
      $("caption").textContent = config.caption;
      renderTabs();
      renderMetrics();
      renderFeed();
      renderStage();
      updateClock();
      runIntroMotion();
      loadLiveData();
      setInterval(tickDashboard, 4200);
      setInterval(updateClock, 10000);
    }

    function renderTabs() {
      $("tabs").innerHTML = config.tabs.map((tab) => `
        <button class="tab ${tab === state.activeTab ? "active" : ""}" type="button" data-tab="${escapeHtml(tab)}">${escapeHtml(tab)}</button>
      `).join("");
      document.querySelectorAll(".tab").forEach((button) => {
        button.addEventListener("click", () => {
          state.activeTab = button.dataset.tab;
          renderTabs();
          pulseState(false);
          animate(button, { scale: [0.98, 1.04, 1], duration: 420, ease: "out(3)" });
        });
      });
    }

    function renderMetrics() {
      $("metrics").innerHTML = state.metrics.map(([label, value, note]) => `
        <article class="metric">
          <div class="metric-label">${escapeHtml(label)}</div>
          <div class="metric-value">${escapeHtml(value)}</div>
          <div class="metric-note">${escapeHtml(note)}</div>
        </article>
      `).join("");
    }

    function renderFeed() {
      $("feed").innerHTML = state.feed.map(([time, title, meta], index) => `
        <article class="feed-item ${index === state.activeFeed ? "active" : ""}" data-index="${index}">
          <div class="feed-time">${escapeHtml(time)}</div>
          <div class="feed-title">${escapeHtml(title)}</div>
          <div class="feed-meta">${escapeHtml(meta)}</div>
        </article>
      `).join("");
      document.querySelectorAll(".feed-item").forEach((item) => {
        item.addEventListener("click", () => {
          state.activeFeed = Number(item.dataset.index);
          renderFeed();
          animate(item, { x: [8, 0], scale: [1.01, 1], duration: 420, ease: "out(3)" });
        });
      });
    }

    function backdropHtml() {
      const assetStyle = config.asset ? `style="--asset:url('${escapeHtml(appUrl(config.asset))}')"` : "";
      const asset = config.asset ? `<div class="asset-plane" ${assetStyle}></div>` : "";
      const video = config.video ? `<video class="texture-video" src="${escapeHtml(appUrl(config.video))}" autoplay muted loop playsinline preload="metadata"></video>` : "";
      return `${asset}${video}<div class="scene-grid"></div><div class="scan-line"></div>`;
    }

    function renderStage() {
      $("stage").innerHTML = backdropHtml() + sceneHtml(config.scene);
      wireSceneInteractions();
      runSceneMotion();
    }

    function metricText(index) {
      const metric = state.metrics[index % state.metrics.length];
      return `<span class="source-label">${escapeHtml(metric[0])}</span><strong>${escapeHtml(metric[1])}</strong><span>${escapeHtml(metric[2])}</span>`;
    }

    function sceneHtml(scene) {
      const renderers = {
        newsroom: renderNewsroom,
        "market-mesh": renderMarketMesh,
        "command-map": renderCommandMap,
        arena: renderArena,
        "source-wall": renderSourceWall,
        orderbook: renderOrderbook,
        prediction: renderPrediction,
        "bio-lab": renderBioLab,
        observatory: renderObservatory,
        "geo-signal": renderGeoSignal,
        meme: renderMeme,
        quantum: renderQuantum,
        abyss: renderAbyss,
        gridops: renderGridOps,
        viralnet: renderViralNet,
        darkwatch: renderDarkWatch,
      };
      return (renderers[scene] || renderCommandMap)();
    }

    function bars(count, className = "bar") {
      return Array.from({ length: count }, (_, index) => {
        const h = seededValue(index, 22, 96);
        return `<div class="${className}" style="height:${h}%"></div>`;
      }).join("");
    }

    function nodes(count, className = "node") {
      return Array.from({ length: count }, (_, index) => {
        const x = seededValue(index, 6, 86);
        const y = seededValue(index + 50, 10, 86);
        return `<span class="${className}" style="left:${x}%;top:${y}%"></span>`;
      }).join("");
    }

    function lines(count, className = "line") {
      return Array.from({ length: count }, (_, index) => {
        const x = seededValue(index, 4, 70);
        const y = seededValue(index + 18, 12, 82);
        const w = seededValue(index + 26, 16, 42);
        const r = seededValue(index + 34, -34, 34);
        return `<span class="${className}" style="left:${x}%;top:${y}%;width:${w}%;transform:rotate(${r}deg)"></span>`;
      }).join("");
    }

    function renderNewsroom() {
      return `<div class="scene newsroom">
        <section class="scene-card lead-visual">
          <div class="lead-frame"></div>
          <div>${metricText(1)}<div class="bar" style="margin-top:8px;width:82%"></div></div>
          <span class="timeline-sweep"></span>
        </section>
        <section class="source-stack">
          ${state.feed.slice(0, 5).map((item, index) => `
            <article class="scene-card source-row">
              <span class="source-label">${escapeHtml(item[0])}</span>
              <div><strong>${escapeHtml(item[2])}</strong><div class="bar" style="margin-top:7px;width:${58 + index * 8}%"></div></div>
              <span class="mono">${72 + index * 5}%</span>
            </article>
          `).join("")}
        </section>
      </div>`;
    }

    function renderMarketMesh() {
      return `<div class="scene market-mesh">
        <section class="scene-card chart-zone">
          <div class="candles">${bars(30, "candle").replace(/class="candle"/g, (_, offset) => offset % 3 ? 'class="candle"' : 'class="candle down"')}</div>
          <div class="signal-bars" style="grid-template-columns:repeat(18,1fr)">${bars(18)}</div>
        </section>
        <section class="ribbon-stack">
          ${state.metrics.map((metric, index) => `
            <article class="scene-card ribbon">${metricText(index)}<div class="bar" style="width:${54 + index * 11}%"></div></article>

    function renderCommandMap() {

    function renderArena() {
      const code = Array.from({ length: 12 }, (_, index) => `<span class="code-line" style="width:${seededValue(index, 42, 100)}%"></span>`).join("");
      return `<div class="scene arena-scene">
        <section class="scene-card agent-lane"><div class="source-label">agent alpha</div><div class="code-stream">${code}</div><div class="bar"></div></section>
        <section class="judge-core"><div class="judge-ring"><div><div class="source-label">judge</div><strong>${escapeHtml(state.metrics[0][1])}</strong><div class="mono">live</div></div></div></section>
        <section class="scene-card agent-lane"><div class="source-label">agent beta</div><div class="code-stream">${code}</div><div class="bar"></div></section>
      </div>`;

    function renderSourceWall() {
      return `<div class="scene source-wall">
        ${Array.from({ length: 12 }, (_, index) => {
          const item = state.feed[index % state.feed.length];
          return `<article class="scene-card wall-card">
            <span class="source-label">${escapeHtml(item[2])}</span>

    function renderOrderbook() {
      const row = (side, index) => `<div class="book-row"><span>${side === "asks" ? "ASK" : "BID"} ${index + 1}</span><span class="book-fill" style="width:${seededValue(index, 22, 100)}%"></span><span>${seededValue(index, 0.4, 9.8).toFixed(2)}</span></div>`;

        <section class="scene-card book-side bids">${Array.from({ length: 14 }, (_, i) => row("bids", i)).join("")}</section>

        <section class="scene-card heat-column">${Array.from({ length: 14 }, (_, i) => `<span class="heat-cell" style="height:${seededValue(i, 14, 42)}px"></span>`).join("")}</section>

        ${Array.from({ length: 28 }, (_, index) => `<span class="qbit" style="left:${seededValue(index, 9, 88)}%;top:${seededValue(index + 12, 9, 86)}%"></span>`).join("")}
        <div class="quantum-shelf">${Array.from({ length: 8 }, (_, index) => `<span class="bar" style="top:${16 + index * 14}px;width:${seededValue(index, 34, 96)}%"></span>`).join("")}</div>
        <div class="quantum-stack">${state.metrics.map((_, index) => `<article class="scene-card">${metricText(index)}<div class="bar"></div></article>`).join("")}</div>
      </div>`;

    function renderAbyss() {
      return `<div class="scene abyss">
        ${Array.from({ length: 6 }, (_, index) => `<span class="wave" style="top:${12 + index * 12}%"></span>`).join("")}
        ${Array.from({ length: 5 }, (_, index) => `<span class="vent" style="left:${12 + index * 17}%;height:${seededValue(index, 62, 126)}px"></span>`).join("")}
        ${nodes(18)}
      </div>`;
    }

    function renderGridOps() {
      return `<div class="scene gridops">
        ${Array.from({ length: 18 }, (_, index) => `<span class="grid-node" style="left:${seededValue(index, 8, 86)}%;top:${seededValue(index + 30, 10, 84)}%"></span>`).join("")}
        ${lines(20, "power-line")}
        <div class="side-stack">${state.metrics.map((_, index) => `<article class="scene-card">${metricText(index)}<div class="bar"></div></article>`).join("")}</div>
      </div>`;
    }

    function renderViralNet() {
      return `<div class="scene viralnet">
        ${Array.from({ length: 42 }, (_, index) => `<span class="person" style="left:${seededValue(index, 8, 90)}%;top:${seededValue(index + 3, 8, 86)}%"></span>`).join("")}
        ${lines(22)}
        <span class="scenario-curve" style="bottom:8%;border-color:var(--accent)"></span>
        <span class="scenario-curve" style="bottom:16%;border-color:var(--accent2)"></span>
        <span class="scenario-curve" style="bottom:24%;border-color:var(--accent3)"></span>
      </div>`;
    }

    function renderDarkWatch() {
      return `<div class="scene darkwatch">
        ${nodes(80, "star")}
        ${Array.from({ length: 90 }, (_, index) => `<span class="catalog-cell" style="left:${seededValue(index, 4, 94)}%;top:${seededValue(index + 16, 6, 82)}%;opacity:${seededValue(index, 0.22, 0.72)}"></span>`).join("")}
        <div class="silence-window"></div>
      </div>`;
    }

    function wireSceneInteractions() {
      document.querySelectorAll(".scene-card, .node, .grid-node, .person, .qbit, .protein-node").forEach((el) => {
        el.addEventListener("mouseenter", () => animate(el, { scale: 1.035, duration: 260, ease: "out(3)" }));
        el.addEventListener("mouseleave", () => animate(el, { scale: 1, duration: 300, ease: "out(3)" }));
      });
    }

    function runIntroMotion() {
      animate(".topbar", { opacity: [0, 1], y: [-12, 0], duration: 560, ease: "out(3)" });
      animate(".metric", { opacity: [0, 1], y: [14, 0], delay: stagger(42), duration: 520, ease: "out(3)" });
      animate(".feed-item", { opacity: [0, 1], x: [12, 0], delay: stagger(36), duration: 520, ease: "out(3)" });
    }

    function runSceneMotion() {
      animate(".scan-line", { y: ["0%", "100%"], opacity: [0.15, 0.82, 0.15], duration: 3100, loop: true, ease: "inOut(2)" });
      animate(".node, .person, .qbit, .protein-node, .grid-node", { scale: [0.72, 1.22, 0.86], opacity: [0.42, 1, 0.66], delay: stagger(38), duration: 2200, loop: true, ease: "inOut(2)" });
      animate(".line, .power-line", { opacity: [0.18, 0.92, 0.22], scaleX: [0.25, 1, 0.62], delay: stagger(55), duration: 2100, loop: true, ease: "inOut(2)" });
      animate(".candle, .bar, .book-fill, .heat-cell, .code-line", { scaleY: [0.72, 1, 0.82], opacity: [0.46, 1, 0.72], delay: stagger(28), duration: 1850, loop: true, ease: "inOut(2)" });
      animate(".prob-curve, .state-orb, .pulsar-ring, .molecule-orbit", { rotate: [0, 360], duration: 14000, loop: true, ease: "linear" });
      animate(".wave, .scenario-curve, .curve-segment", { translateX: [-18, 18, -18], opacity: [0.35, 0.82, 0.42], delay: stagger(120), duration: 3600, loop: true, ease: "inOut(2)" });
      animate(".timeline-sweep, .transit-path", { translateX: ["-120%", "120%"], duration: 2600, loop: true, ease: "inOut(2)" });
      animate(".texture-video", { opacity: [0.12, 0.24, 0.16], duration: 5200, loop: true, ease: "inOut(2)" });
    }

    function updateClock() {
      $("clock").textContent = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function tickDashboard() {
      state.tick += 1;
      if (state.tick % 2 === 0) pulseState(false);
      state.activeFeed = (state.activeFeed + 1) % state.feed.length;
      renderFeed();
      animate(".feed-item.active", { x: [8, 0], borderColor: [palette[0], "rgba(255,255,255,0.12)"], duration: 650, ease: "out(3)" });
    }

    function pulseState(rebuildStage = true) {
      state.metrics = state.metrics.map(([label, value, note], index) => {
        if (/%$/.test(value)) return [label, `${Math.max(1, Math.min(99, Number(value.replace("%", "")) + Math.round(seededValue(index, -4, 5))))}%`, note];
        if (/^\d+(\.\d+)?$/.test(value)) return [label, String(Math.max(1, Math.round(Number(value) + seededValue(index, -3, 4)))), note];
        return [label, value, note];
      });
      renderMetrics();
      if (rebuildStage) renderStage();
      animate(".metric", { scale: [1, 1.025, 1], delay: stagger(35), duration: 420, ease: "out(3)" });
    }

    async function loadLiveData() {
      if (!config.api) {
        $("source-chip").textContent = "deterministic synthetic state";
        return;
      }
      $("source-chip").textContent = `loading ${config.api}`;
      try {
        const resp = await fetch(appUrl(`/api/live/${config.api}?dashboard=${encodeURIComponent(dashboardId)}`), { cache: "no-store" });
        const payload = await resp.json();
        state.livePayload = payload;
        applyLivePayload(payload);
        $("source-chip").textContent = payload.fallbackReason
          ? `${payload.source} fallback`
          : `${payload.source}${payload.stale ? " stale" : " live"}`;
      } catch (err) {
        $("source-chip").textContent = "synthetic fallback";
      }
    }

    function applyLivePayload(payload) {
      const data = payload && payload.data;
      if (!data) return;
      if (config.api === "hyperliquid") applyHyperliquidData(data);
      if (config.api === "polymarket") applyPolymarketData(data);
      if (config.api === "pumpfun") applyPumpfunData(data);
      renderMetrics();
      renderFeed();
      renderStage();
      animate(".metric, .feed-item.active", { scale: [1, 1.025, 1], duration: 520, ease: "out(3)" });
    }

    function applyHyperliquidData(data) {
      const mid = Number(data.mid || data.mark || 0);
      const spread = Number(data.spreadBps || 4.2);
      const depth = Number(data.depthUsd || 72000);
      if (mid > 0) state.metrics[0] = [data.coin || "BTC", `$${Math.round(mid).toLocaleString()}`, "hyperliquid"];
      state.metrics[1] = state.metrics[1][0] === "Spread" ? ["Spread", `${spread.toFixed(2)}bp`, "book"] : state.metrics[1];
      state.metrics[2] = state.metrics[2][0] === "Depth" ? ["Depth", `$${Math.round(depth / 1000)}K`, "two-sided"] : state.metrics[2];
      if (Array.isArray(data.candles) && data.candles.length) {
        state.feed = data.candles.slice(-5).reverse().map((candle, index) => [
          `${index * 3}m`,
          `${data.coin || "BTC"} candle closed at $${Math.round(Number(candle.c || candle.close || mid)).toLocaleString()}.`,
          "read-only market data",
        ]);
      }
    }

    function applyPolymarketData(data) {
      const markets = Array.isArray(data.markets) ? data.markets.slice(0, 5) : [];
      if (!markets.length) return;
      state.metrics[0] = ["Markets", String(markets.length), "polymarket"];
      state.metrics[1] = ["Top YES", `${Math.round((markets[0].yes || 0.5) * 100)}%`, "implied"];
      state.feed = markets.map((market, index) => [
        `${index * 4}m`,
        market.question || "Public prediction market updated.",
        `${Math.round((market.yes || 0.5) * 100)}% yes / ${market.category || "market"}`,
      ]);
    }

    function applyPumpfunData(data) {
      const tokens = Array.isArray(data.tokens) ? data.tokens.slice(0, 5) : [];
      if (!tokens.length) return;
      state.metrics[0] = ["Tokens", String(tokens.length), "pump style"];
      state.metrics[1] = ["Leader", String(tokens[0].symbol || tokens[0].name || "MEME").slice(0, 8).toUpperCase(), "velocity"];
      state.metrics[2] = ["1H", `${Number(tokens[0].change1h || tokens[0].change24h || 0).toFixed(1)}%`, "change"];
      state.feed = tokens.map((token, index) => [
        index === 0 ? "now" : `${index * 3}m`,
        `${token.name || token.symbol || "Token"} moved through the social market watchlist.`,
        `mcap ${token.marketCap || "synthetic"} / read-only`,
      ]);
    }

    $("pulse-btn").addEventListener("click", () => pulseState(true));
    $("refresh-btn").addEventListener("click", () => loadLiveData());
    $("focus-btn").addEventListener("click", () => {
      state.activeFeed = (state.activeFeed + 1) % state.feed.length;
      renderFeed();
      animate(".feed-item.active", { x: [12, 0], scale: [1.015, 1], duration: 420, ease: "out(3)" });
    });

    render();
  </script>
</body>
</html>
