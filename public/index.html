<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Katechon</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }

    video { width: 100%; height: 100%; object-fit: contain; display: block; }

    #status {
      position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: #00e87b;
      font-family: monospace; font-size: 12px; padding: 6px 14px;
      border-radius: 4px; letter-spacing: 0.1em;
      pointer-events: none;
    }

    /* ── SHARED OVERLAY BASE ──
       Content-frame in stream: left=60px top=80px w=1100px h=880px @ 1920×1080
       As % of viewport: left=3.1% top=7.4% width=57.3% height=81.5%
       Title bar inside frame is 32px tall (~3% of height), so content starts at ~10.4% top
    */
    .overlay {
      position: fixed;
      left: 3.1%; top: 10.4%;
      width: 57.3%; height: 78.5%;
      z-index: 10;
      pointer-events: none;
    }
    .overlay.hidden { display: none !important; }

    /* ── EMAIL OVERLAY ── */
    #email-overlay {
      display: flex; align-items: center; justify-content: center;
    }

    .email-card {
      pointer-events: all;
      background: rgba(13,13,15,0.82);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      padding: 24px 28px;
      width: 320px;
      backdrop-filter: blur(10px);
    }
    .card-input {
      width: 100%; background: #0d0d0f;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 6px; padding: 12px 16px;
      font-family: monospace; font-size: 13px;
      color: #e8e8ec; margin-bottom: 12px;
      outline: none; transition: border-color 0.2s;
    }
    .card-input:focus { border-color: #00e87b; }
    .card-input::placeholder { color: #6b6b78; }
    .card-btn {
      width: 100%; background: #00e87b; color: #000;
      border: none; border-radius: 6px; padding: 12px;
      font-family: monospace; font-size: 12px; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      cursor: pointer; transition: opacity 0.2s;
    }
    .card-btn:hover { opacity: 0.85; }

    /* ── SPEECH BUTTON ── */
    #speech-btn {
      position: fixed; bottom: 36px; right: 36px; z-index: 50;
      width: 88px; height: 88px;
      background: rgba(13,13,15,0.88);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 50%;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
      backdrop-filter: blur(10px);
      transition: border-color 0.2s, transform 0.15s;
    }
    #speech-btn:hover {
      border-color: #00e87b;
      transform: scale(1.06);
    }
    #speech-btn.listening {
      border-color: #ff4444;
      background: rgba(255,68,68,0.15);
      animation: mic-pulse 1s ease-in-out infinite;
    }
    @keyframes mic-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,68,68,0.4); }
      50%       { box-shadow: 0 0 0 14px rgba(255,68,68,0); }
    }
    #speech-btn svg { pointer-events: none; }
    #speech-btn span {
      font-family: monospace; font-size: 9px;
      letter-spacing: 0.12em; color: rgba(255,255,255,0.4);
      text-transform: uppercase; pointer-events: none;
    }

    /* ── TRANSCRIPT TOAST ── */
    #transcript {
      position: fixed; bottom: 140px; right: 36px;
      background: rgba(13,13,15,0.9); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px; padding: 8px 14px;
      font-family: monospace; font-size: 12px; color: #e8e8ec;
      letter-spacing: 0.05em; max-width: 280px;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    #transcript.visible { opacity: 1; transform: translateY(0); }

    /* ── MAIN OVERLAY (after email) ── */
    #main-overlay {
      padding: 36px 40px;
      display: flex; flex-direction: column; gap: 32px;
    }

    .main-title {
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-size: 4.2vw; font-weight: 700;
      color: #fff; line-height: 1.1;
    }
    .main-sub {
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-size: 1.4vw; color: rgba(255,255,255,0.7);
      margin-top: -20px;
    }

    .gif-row {
      display: flex; gap: 20px;
      pointer-events: all;
    }
    .gif-box {
      flex: 1; aspect-ratio: 4/3;
      border-radius: 6px; overflow: hidden;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      transition: border-color 0.2s, transform 0.15s;
      position: relative;
    }
    .gif-box:hover {
      border-color: #00e87b;
      transform: translateY(-2px);
    }
    .gif-box img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .gif-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 6px 10px;
      background: rgba(0,0,0,0.6);
      font-family: monospace; font-size: 10px;
      letter-spacing: 0.15em; color: #00e87b;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <video id="v" autoplay muted playsinline></video>
  <div id="status">connecting...</div>

  <!-- landing: email input -->
  <div id="email-overlay" class="overlay">
    <div class="email-card">
      <input id="email-input" class="card-input" type="email"
        placeholder="Enter your email" autocomplete="email">
      <button class="card-btn" onclick="enter()">Access Stream</button>
    </div>
  </div>

  <!-- after email: title + gif thumbnails -->
  <div id="main-overlay" class="overlay hidden">
    <div class="main-title">Katechon Technology</div>
    <div class="main-sub">24hr interactive livestream</div>
    <div class="gif-row">
      <div class="gif-box" onclick="switchWs('spectre')">
        <img src="gifs/spectre.gif" alt="SPECTRE" onerror="this.style.display='none'">
        <div class="gif-label">OSINT / SPECTRE</div>
      </div>
      <div class="gif-box" onclick="switchWs('minecraft')">
        <img src="gifs/minecraft.gif" alt="Minecraft" onerror="this.style.display='none'">
        <div class="gif-label">Minecraft AI</div>
      </div>
      <div class="gif-box" onclick="switchWs('news')">
        <img src="gifs/news.gif" alt="News" onerror="this.style.display='none'">
        <div class="gif-label">AI News Feed</div>
      </div>
    </div>
  </div>

  <div id="transcript"></div>

  <!-- ── SPEECH BUTTON ── -->
  <button id="speech-btn" title="Push to talk">
    <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#00e87b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="2" width="6" height="11" rx="3"/>
      <path d="M5 10a7 7 0 0 0 14 0"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
    <span>hold</span>
  </button>

  <script>
    // Reset stream to landing state on every page load
    fetch('/api/switch/landing', { method: 'POST' }).catch(() => {});

    const v   = document.getElementById('v');
    const st  = document.getElementById('status');
    const src = 'http://localhost:9095/stream.m3u8';

    if (Hls.isSupported()) {
      const hls = new Hls({ liveSyncDurationCount: 3, maxBufferLength: 15 });
      hls.loadSource(src);
      hls.attachMedia(v);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        v.play().catch(() => {});
        st.textContent = '● LIVE — katechon-desktop';
      });
      hls.on(Hls.Events.ERROR, (_, d) => {
        if (d.fatal) { st.textContent = 'reconnecting...'; setTimeout(() => hls.loadSource(src), 2000); }
      });
    } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
      v.src = src;
      v.addEventListener('loadedmetadata', () => v.play().catch(() => {}));
    }

    function enter() {
      const email = document.getElementById('email-input').value.trim();
      if (!email || !email.includes('@')) {
        document.getElementById('email-input').style.borderColor = '#ff4444';
        return;
      }
      fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      document.getElementById('email-overlay').classList.add('hidden');
      document.getElementById('main-overlay').classList.remove('hidden');
    }

    function switchWs(workspace) {
      const req = fetch(`/api/switch/${workspace}`, { method: 'POST' }).catch(() => {});
      document.getElementById('main-overlay').classList.add('hidden');
      return req;
    }

    document.getElementById('email-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') enter();
    });

    // ── VOICE / PUSH-TO-TALK ──────────────────────────────────────────────────
    const micBtn       = document.getElementById('speech-btn');
    const transcriptEl = document.getElementById('transcript');
    let mediaRecorder  = null;
    let audioChunks    = [];
    let toastTimer     = null;
    let replyAudioCtx  = null;
    let replySource    = null;

    function goHome() {
      const req = fetch('/api/switch/landing', { method: 'POST' }).catch(() => {});
      document.getElementById('main-overlay').classList.remove('hidden');
      return req;
    }

    function showToast(text, color) {
      transcriptEl.textContent = text;
      transcriptEl.style.color = color || '#e8e8ec';
      transcriptEl.classList.add('visible');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => transcriptEl.classList.remove('visible'), 3000);
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function readableDelay(text) {
      return Math.max(900, Math.min(3600, (text.length / 14) * 1000));
    }

    function getReplyAudioContext() {
      if (!replyAudioCtx) replyAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return replyAudioCtx;
    }

    async function unlockAgentAudio() {
      const ctx = getReplyAudioContext();
      if (ctx.state === 'suspended') await ctx.resume();
      const buffer = ctx.createBuffer(1, 1, ctx.sampleRate);
      const source = ctx.createBufferSource();
      source.buffer = buffer;
      source.connect(ctx.destination);
      source.start(0);
    }

    async function playBase64Audio(base64) {
      const ctx = getReplyAudioContext();
      if (ctx.state === 'suspended') await ctx.resume();
      if (replySource) {
        try { replySource.stop(); } catch (_) {}
        replySource = null;
      }

      const raw = atob(base64);
      const bytes = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
      const audioBuffer = await ctx.decodeAudioData(bytes.buffer);
      const source = ctx.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(ctx.destination);
      replySource = source;

      await new Promise(resolve => {
        const timeout = setTimeout(resolve, Math.ceil(audioBuffer.duration * 1000) + 600);
        source.onended = () => {
          clearTimeout(timeout);
          if (replySource === source) replySource = null;
          resolve();
        };
        source.start(0);
      });
    }

    async function playAgentReply(command) {
      const speech = command.speech || command.reply || '';
      if (speech) showToast(`Kat: ${speech}`, '#00e87b');
      console.log('agent audio:', {
        id: command.id,
        muted: command.muted,
        audioBytes: command.audio ? Math.floor((command.audio.length * 3) / 4) : 0,
        remote: command.remote,
      });
      if (!command.audio || command.muted) {
        await wait(readableDelay(speech));
        return;
      }
      await playBase64Audio(command.audio);
    }

    async function executeCommand(command) {
      if (command.workspace === 'spectre' || command.action === 'open_spectre') {
        document.getElementById('main-overlay').classList.add('hidden');
        showToast('→ SPECTRE OSINT', '#00e87b');
        return;
      }
      if (command.workspace === 'landing' || command.action === 'go_home') {
        document.getElementById('main-overlay').classList.remove('hidden');
        showToast('→ main panel', '#00e87b');
        return;
      }
      showToast(command.speech || command.reply || 'command not recognized', '#6b6b78');
    }

    async function handleCommand(text) {
      showToast(`"${text}"`, '#e8e8ec');
      const r = await fetch('/api/agent', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transcript: text }),
      });
      const command = await r.json();
      console.log('command response:', command);
      if (!r.ok) throw new Error(command.error || `command failed (${r.status})`);
      await executeCommand(command);
      playAgentReply(command).catch(err => {
        console.warn('agent voice failed:', err);
        const speech = command.speech || command.reply;
        if (speech) showToast(`Kat: ${speech}`, '#00e87b');
      });
    }

    function setListening(on) {
      micBtn.classList.toggle('listening', on);
      micBtn.querySelector('span').textContent = on ? 'listening' : 'hold';
    }

    const MIME = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/ogg','audio/mp4']
      .find(m => MediaRecorder.isTypeSupported(m)) || '';

    async function startRecording() {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream, MIME ? { mimeType: MIME } : {});
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        setListening(false);
        showToast('transcribing…', '#6b6b78');
        const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
        console.log('audio blob:', blob.size, 'bytes, type:', blob.type);
        if (blob.size < 1000) { showToast('too short — hold longer', '#6b6b78'); return; }
        try {
          const r = await fetch('/api/transcribe', {
            method: 'POST',
            headers: { 'Content-Type': blob.type },
            body: blob,
          });
          const data = await r.json();
          console.log('transcribe response:', data);
          if (!r.ok) throw new Error(data.error || `transcribe failed (${r.status})`);
          const text = data.text;
          if (text) await handleCommand(text);
          else showToast('no speech detected', '#6b6b78');
        } catch(e) {
          console.error('transcription error:', e);
          showToast('transcription error', '#ff4444');
        }
      };
      mediaRecorder.start();
      setListening(true);
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
    }

    micBtn.addEventListener('mousedown',  (e) => {
      e.preventDefault();
      unlockAgentAudio().catch(() => {});
      startRecording().catch(() => showToast('mic access denied', '#ff4444'));
    });
    micBtn.addEventListener('mouseup',    () => stopRecording());
    micBtn.addEventListener('mouseleave', () => stopRecording());
    micBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      unlockAgentAudio().catch(() => {});
      startRecording().catch(() => showToast('mic access denied', '#ff4444'));
    });
    micBtn.addEventListener('touchend',   () => stopRecording());
  </script>
</body>
</html>
