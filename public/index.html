<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Katechon</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }

    video { width: 100%; height: 100%; object-fit: contain; display: block; }

    #status {
      position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: #00e87b;
      font-family: monospace; font-size: 12px; padding: 6px 14px;
      border-radius: 4px; letter-spacing: 0.1em;
      pointer-events: none;
    }

    /* ── EMAIL OVERLAY ── */
    #email-overlay {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
    }
    #email-overlay.hidden { display: none; }

    .email-card {
      background: rgba(13,13,15,0.82);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      padding: 40px 44px;
      width: 400px;
      text-align: center;
      position: relative;
      backdrop-filter: blur(10px);
    }
    .email-card::before {
      content: "";
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 60%; height: 1px;
      background: linear-gradient(90deg, transparent, #00e87b, transparent);
    }
    .card-label {
      font-family: monospace; font-size: 10px;
      letter-spacing: 0.3em; color: #00e87b;
      margin-bottom: 20px; text-transform: uppercase;
    }
    .card-title {
      font-family: monospace; font-size: 20px; font-weight: 700;
      color: #e8e8ec; margin-bottom: 8px;
    }
    .card-sub {
      font-family: monospace; font-size: 11px;
      color: #6b6b78; margin-bottom: 28px; line-height: 1.7;
    }
    .card-input {
      width: 100%; background: #0d0d0f;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 6px; padding: 12px 16px;
      font-family: monospace; font-size: 13px;
      color: #e8e8ec; margin-bottom: 12px;
      outline: none; transition: border-color 0.2s;
    }
    .card-input:focus { border-color: #00e87b; }
    .card-input::placeholder { color: #6b6b78; }
    .card-btn {
      width: 100%; background: #00e87b; color: #000;
      border: none; border-radius: 6px; padding: 12px;
      font-family: monospace; font-size: 12px; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      cursor: pointer; transition: opacity 0.2s;
    }
    .card-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <video id="v" autoplay muted playsinline></video>
  <div id="status">connecting...</div>

  <div id="email-overlay">
    <div class="email-card">
      <div class="card-label">Katechon Technology</div>
      <div class="card-title">Intelligence Platform</div>
      <div class="card-sub">
        Real-time threat analysis.<br>
        Autonomous AI intelligence agents.
      </div>
      <input id="email-input" class="card-input" type="email"
        placeholder="Enter your email to access the stream" autocomplete="email">
      <button class="card-btn" onclick="enter()">Access Stream</button>
    </div>
  </div>

  <script>
    const v   = document.getElementById('v');
    const st  = document.getElementById('status');
    const src = 'http://localhost:9095/stream.m3u8';

    if (Hls.isSupported()) {
      const hls = new Hls({ liveSyncDurationCount: 3, maxBufferLength: 15 });
      hls.loadSource(src);
      hls.attachMedia(v);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        v.play().catch(() => {});
        st.textContent = '● LIVE — katechon-desktop';
      });
      hls.on(Hls.Events.ERROR, (_, d) => {
        if (d.fatal) { st.textContent = 'reconnecting...'; setTimeout(() => hls.loadSource(src), 2000); }
      });
    } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
      v.src = src;
      v.addEventListener('loadedmetadata', () => v.play().catch(() => {}));
    }

    function enter() {
      const email = document.getElementById('email-input').value.trim();
      if (!email || !email.includes('@')) {
        document.getElementById('email-input').style.borderColor = '#ff4444';
        return;
      }
      fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      document.getElementById('email-overlay').classList.add('hidden');
    }

    document.getElementById('email-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') enter();
    });
  </script>
</body>
</html>
