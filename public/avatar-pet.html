<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Avatar Pet</title>
<link rel="preload" href="libs/live2dcubismcore.min.js" as="script">
<link rel="preload" href="libs/live2d.min.js" as="script">
<link rel="preload" href="libs/pixi.min.js" as="script">
<link rel="preload" href="libs/pixi-live2d-display.min.js" as="script">
<link rel="preload" href="live2d-models/zhongxingshekongdlc/zhongxingshekong.fast.model3.json" as="fetch" type="application/json" crossorigin>
<link rel="preload" href="live2d-models/zhongxingshekongdlc/zhongxingshekong.moc3" as="fetch" crossorigin>
<link rel="preload" href="live2d-models/zhongxingshekongdlc/zhongxingshekong.2048/texture_00.png" as="image" type="image/png" fetchpriority="high">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="avatar-canvas"></canvas>
<script src="libs/live2dcubismcore.min.js"></script>
<script src="libs/live2d.min.js"></script>
<script src="libs/pixi.min.js"></script>
<script src="libs/pixi-live2d-display.min.js"></script>
<script>
if (typeof PIXI === 'undefined' || !PIXI.live2d || !PIXI.live2d.Live2DModel) {
  console.error('[avatar] PIXI or Live2D not loaded');
} else {

const MODELS = [
  {
    name: 'Zhongxing',
    url: 'live2d-models/zhongxingshekongdlc/zhongxingshekong.fast.model3.json',
    fallbackUrl: 'live2d-models/zhongxingshekongdlc/zhongxingshekong.model3.json',
    fallbackAfterMs: 2400,
    scale: 0.755,
    yFactor: 1.35,
    lipParam: 'ParamMouthOpenY',
  },
];

const _params = new URLSearchParams(window.location.search);
const DEFAULT_MODEL = 0;
const INITIAL_MODEL = Math.min(parseInt(_params.get('model') || String(DEFAULT_MODEL), 10), MODELS.length - 1);
const PARAM_W = parseInt(_params.get('w') || '', 10);
const PARAM_H = parseInt(_params.get('h') || '', 10);
const REFERENCE_HEIGHT = Math.max(1, parseInt(_params.get('refH') || '1080', 10));
const X_FACTOR = Number.isFinite(Number(_params.get('xFactor'))) ? Number(_params.get('xFactor')) : 0.8;

function canvasWidth() {
  if (Number.isFinite(PARAM_W) && PARAM_W > 0) return PARAM_W;
  return Math.max(1, Math.round(window.innerWidth || 640));
}

function canvasHeight() {
  if (Number.isFinite(PARAM_H) && PARAM_H > 0) return PARAM_H;
  return Math.max(1, Math.round(window.innerHeight || 1080));
}

let W = canvasWidth();
let H = canvasHeight();

const app = new PIXI.Application({
  view: document.getElementById('avatar-canvas'),
  width: W, height: H,
  backgroundAlpha: 0, antialias: true,
});

let currentModel = null;
let expressionTimer = null;
let currentModelIndex = null;
let loadSeq = 0;
let currentScale = 0.26;
let currentYFactor = 1.20;

async function switchModel(index) {
  const requested = Number.isFinite(Number(index)) ? Number(index) : 0;
  const safeIndex = Math.max(0, Math.min(requested, MODELS.length - 1));
  if (currentModel && currentModelIndex === safeIndex) return;
  const mySeq = ++loadSeq;
  if (currentModel) { app.stage.removeChild(currentModel); currentModel.destroy(); currentModel = null; currentModelIndex = null; }
  if (expressionTimer) { clearInterval(expressionTimer); expressionTimer = null; }
  await loadModel(MODELS[safeIndex], safeIndex, mySeq);
}

function applyTransform(scale, yFactor) {
  if (!currentModel) return;
  currentScale = scale;
  currentYFactor = yFactor;
  currentModel.scale.set(scale * (H / REFERENCE_HEIGHT));
  currentModel.x = W * X_FACTOR;
  currentModel.y = H * yFactor;
}

function resizeAvatar() {
  resizeAvatarTo(canvasWidth(), canvasHeight());
}

function resizeAvatarTo(width, height) {
  const nextW = Math.max(1, Math.round(Number(width) || 0));
  const nextH = Math.max(1, Math.round(Number(height) || 0));
  if (nextW === W && nextH === H) return;
  W = nextW;
  H = nextH;
  app.renderer.resize(W, H);
  applyTransform(currentScale, currentYFactor);
}

window.addEventListener('resize', resizeAvatar);
requestAnimationFrame(resizeAvatar);
setTimeout(resizeAvatar, 100);
setTimeout(resizeAvatar, 500);

// --- Audio state ---
let audioCtx = null, analyser = null, analyserData = null;
let currentSource = null, currentMouth = 0, playbackSeq = 0;
let manualMouth = 0, manualMouthUntil = 0;
const RMS_GAIN = 1.5;

function getRms() {
  if (manualMouthUntil > performance.now()) return manualMouth;
  if (!analyser || !currentSource) return 0;
  analyser.getByteTimeDomainData(analyserData);
  let sum = 0;
  for (let i = 0; i < analyserData.length; i++) { const v = (analyserData[i]-128)/128; sum += v*v; }
  return Math.min(1, Math.sqrt(sum / analyserData.length) * RMS_GAIN);
}

function setManualMouth(level) {
  manualMouth = Math.max(0, Math.min(1, Number(level) || 0));
  manualMouthUntil = performance.now() + 180;
}

async function ensureAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyserData = new Uint8Array(analyser.fftSize);
    analyser.connect(audioCtx.destination);
  }
  // Must await: suspended context produces silent playback with active analyser
  if (audioCtx.state === 'suspended') {
    try { await audioCtx.resume(); } catch (e) { console.warn('[avatar] resume failed:', e); }
  }
}

function stopAudio() {
  playbackSeq++;
  if (currentSource) { try { currentSource.stop(); } catch (e) {} currentSource = null; }
  currentMouth = 0;
  manualMouth = 0;
  manualMouthUntil = 0;
}

async function audioDataForPayload(payload) {
  if (payload.audio) {
    const raw = atob(payload.audio);
    const buf = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i);
    return buf.buffer;
  }

  if (payload.audioUrl) {
    const resp = await fetch(payload.audioUrl, { cache: 'force-cache' });
    if (!resp.ok) throw new Error(`audio fetch ${resp.status}`);
    return await resp.arrayBuffer();
  }

  return null;
}

async function playPayload(payload) {
  stopAudio();
  const id = payload.id || null;
  const mySeq = ++playbackSeq;
  try {
    const audioData = await audioDataForPayload(payload);
    if (!audioData) return;
    await ensureAudioCtx();
    const audioBuffer = await audioCtx.decodeAudioData(audioData);
    if (mySeq !== playbackSeq) return;
    const source = audioCtx.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(analyser);
    const requestedOffsetMs = Number(payload.offsetMs) || 0;
    const offsetSeconds = Math.min(Math.max(0, requestedOffsetMs / 1000), Math.max(0, audioBuffer.duration - 0.25));
    source.start(0, offsetSeconds);
    currentSource = source;
    try { window.parent.postMessage({ type: 'audio-started', id, durationMs: Math.round(audioBuffer.duration * 1000), offsetMs: Math.round(offsetSeconds * 1000) }, '*'); } catch (e) {}
    source.onended = () => {
      const naturalEnd = currentSource === source;
      if (naturalEnd) currentSource = null;
      try { window.parent.postMessage({ type: 'audio-ended', id, natural: naturalEnd }, '*'); } catch (e) {}
    };
  } catch (err) {
    console.error('[avatar] audio decode error:', err);
    try { window.parent.postMessage({ type: 'audio-ended', id, natural: false, error: err.message }, '*'); } catch (e) {}
  }
}

window.addEventListener('message', (e) => {
  if (!e.data) return;
  if (e.data.type === 'unlock') ensureAudioCtx();
  if (e.data.type === 'audio') playPayload(e.data);
  if (e.data.type === 'stop') stopAudio();
  if (e.data.type === 'mouth') setManualMouth(e.data.level);
  if (e.data.type === 'resize') resizeAvatarTo(e.data.width, e.data.height);
  if (e.data.type === 'switch-model') switchModel(e.data.index ?? 0);
  if (e.data.type === 'tune') applyTransform(e.data.scale, e.data.yFactor);
});

async function loadModel(cfg, index, mySeq) {
  let model;
  const loadOptions = { autoInteract: false, autoUpdate: true };
  try {
    const fastModel = PIXI.live2d.Live2DModel.from(cfg.url, loadOptions);
    if (cfg.fallbackUrl && cfg.fallbackAfterMs) {
      let useFastModel = false;
      const fastWinner = fastModel.then(nextModel => {
        useFastModel = true;
        return nextModel;
      });
      fastModel.then(lateModel => {
        if (!useFastModel && lateModel !== model) lateModel.destroy();
      }).catch(() => {});
      model = await Promise.race([
        fastWinner,
        new Promise((_, reject) => setTimeout(() => reject(new Error('optimized model timed out')), cfg.fallbackAfterMs)),
      ]);
    } else {
      model = await fastModel;
    }
  } catch (err) {
    if (!cfg.fallbackUrl) throw err;
    console.warn('[avatar] optimized model failed, loading fallback:', err);
    model = await PIXI.live2d.Live2DModel.from(cfg.fallbackUrl, loadOptions);
  }
  if (mySeq !== loadSeq) {
    model.destroy();
    return;
  }
  currentModel = model;
  currentModelIndex = index;
  app.stage.addChild(model);
  model.anchor.set(0.5, 0.5);

  applyTransform(cfg.scale, cfg.yFactor);

  try { model.motion('Idle', 0, PIXI.live2d.MotionPriority.IDLE); } catch (e) {}

  const numExpressions = model.internalModel?.settings?.expressions?.length ?? 8;
  expressionTimer = setInterval(() => {
    try { model.expression(Math.floor(Math.random() * numExpressions)); } catch (e) {}
  }, 8000);

  model.internalModel.on('beforeModelUpdate', () => {
    const target = getRms();
    const speed = target > currentMouth ? 0.7 : 0.4;
    currentMouth += (target - currentMouth) * speed;
    if (currentMouth < 0.01) currentMouth = 0;
    model.internalModel.coreModel.setParameterValueById(cfg.lipParam, currentMouth);
  });

  // Report current values to parent for tune panel
  try { window.parent.postMessage({ type: 'avatar-ready', scale: currentScale, yFactor: currentYFactor }, '*'); } catch (e) {}
  console.log('[avatar] loaded:', cfg.name, 'scale:', currentScale, 'yFactor:', currentYFactor);
}

switchModel(INITIAL_MODEL).catch(err => console.error('[avatar] switchModel failed:', err));

} // end PIXI guard
</script>
</body>
</html>
